<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Framework - Digital Citizenship Room</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            background-color: #2c3e50; color: white; font-family: 'Arial', sans-serif;
            overflow: hidden; height: 100vh;
        }
        #game-container {
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #34495e; background: #f5f0e6;
        }
        canvas { display: block; }
        #hud {
            position: absolute; top: 20px; left: 20px; font-size: 34px;
            font-weight: bold; color: #000; pointer-events: none;
            text-shadow: 1px 1px 0px white;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 20px; color: #464646;
            font-size: 18px; pointer-events: none; background: rgba(255,255,255,0.7);
            padding: 5px 10px; border-radius: 5px;
        }
        #popup-overlay {
            display: none; position: absolute; top: 0; left: 0;
            width: 800px; height: 600px; background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center; z-index: 10;
        }
        #popup-content {
            background: #fff5b4; border: 6px solid #dcc23c; border-radius: 24px;
            width: 640px; max-height: 90%; overflow-y: auto; padding: 40px;
            color: #000; box-sizing: border-box; position: relative; text-align: center;
        }
        #popup-image {
    display: none; 
    width: 280px;      /* Fixed width */
    height: 180px;     /* Fixed height */
    object-fit: contain; /* Ensures the whole image fits without distortion */
    margin: 0 auto 20px auto; 
    border-radius: 10px;
    border: 3px solid #dcc23c;
    background: #fff;  /* Adds a clean white background behind transparent PNGs */
}
        #popup-text { font-size: 19px; line-height: 1.5; margin-bottom: 20px; text-align: left; }
        .option {
            background: rgba(255,255,255,0.6); margin: 10px 0; padding: 12px;
            border-radius: 8px; cursor: pointer; border: 2px solid #dcc23c;
            transition: 0.2s; text-align: left; font-size: 18px;
        }
        .option:hover { background: #fff; transform: translateX(5px); }
        .feedback { font-weight: bold; margin-top: 20px; font-size: 22px; }
        .close-hint { margin-top: 20px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">Score: 0/30</div>
        <div id="instructions">Arrows = Move | Space = Interact</div>
        
        <div id="popup-overlay">
            <div id="popup-content">
                <h2 id="popup-title">PAPER</h2>
                <img id="popup-image" src="" alt="Laptop">
                <div id="popup-text"></div>
                <div id="options-container"></div>
                <div id="feedback-area"></div>
                <div class="close-hint">Press SPACE or ESC to close</div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const popupOverlay = document.getElementById('popup-overlay');
    const popupImg = document.getElementById('popup-image');
    
    const images = {};
    const imageFiles = {
    background: 'room_background.jpg',
    paper: 'paper_icon.png',
    idle: 'avatar_idle.png',
    walkLeft: 'avatar_walk_left.png',
    walkRight: 'avatar_walk_right.png',
    laptop: 'Laptop-computer.jpg',
    printer: '204-2042717_printer-epson-color-png-download-hd-epson-printer.jpg',
    charger: '9f99de48-1180-4687-8339-901f66eb5f77.d934e5257ee17db8263aac956eadd381.jpg' // New Charger Asset
};

    let imagesLoaded = 0;
    const totalImages = Object.keys(imageFiles).length;

    function loadImages() {
        for (let key in imageFiles) {
            images[key] = new Image();
            images[key].src = imageFiles[key];
            images[key].onload = () => {
                imagesLoaded++;
                if (imagesLoaded === totalImages) gameLoop();
            };
            images[key].onerror = () => {
                console.warn(`Could not load ${imageFiles[key]}`);
                imagesLoaded++;
                if (imagesLoaded === totalImages) gameLoop();
            };
        }
    }

    let score = 0;
    let isPaused = false;
    let currentPaper = null;
    const interactionDist = 80;

    const avatar = { 
        x: 400, 
        y: 300, 
        width: 70, 
        height: 70, 
        speed: 5, 
        moving: false,
        lastDir: 'right', 
        angle: 0,
        frame: 0,
        lastFrameSwap: 0
    };
    const keys = {};

    const infoContents = [
        "A portable computer with a screen and keyboard. It allows you to visit websites, write documents, and talk to people online.",
        "A cord that connects your device to a power outlet in the wall. It feeds the battery so the device doesn't turn off.",
        "A machine that takes digital information (like a photo or a letter) from a computer and puts it onto a piece of paper using ink.",
        "Social: Respecting yourself and others as digital citizens. This involves digital etiquette, rights and responsibilities, and proper communication and collaboration.",
        "Connection to Nine Elements: The S3 Framework reinforces the nine elements such as Digital Access, Commerce, Communication, Etiquette, Law, Rights & Responsibilities, Health & Wellness, and Security."
    ];

    const questions = [
        { q: "What does the 'S3' in S3 Framework stand for?", opts: ["Safe, Secure, Social", "Safe, Savvy, Social", "Smart, Savvy, Secure", "Safe, Smart, Social"], correct: 1 },
        { q: "Which part of S3 focuses on protecting from harm?", opts: ["Savvy", "Social", "Safe", "All of them"], correct: 2 },
    ];

    const papers = [
        {x: 130, y: 140, type: 'info', id: 0, read: false}, // Cover changed to laptop
        {x: 240, y: 430, type: 'info', id: 1, read: false},
        {x: 630, y: 130, type: 'info', id: 2, read: false},
        {x: 690, y: 490, type: 'info', id: 3, read: false},
        {x: 430, y: 330, type: 'info', id: 4, read: false},
        {x: 150, y: 530, type: 'question', id: 0, answered: false},
        {x: 340, y: 230, type: 'question', id: 1, answered: false},
    ];

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if ((e.code === 'Space' || e.code === 'Escape') && isPaused) {
            if (currentPaper.type === 'info' || currentPaper.answered) closePopup();
        } else if (e.code === 'Space' && !isPaused) {
            checkInteraction();
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function checkInteraction() {
        papers.forEach(p => {
            const dx = (avatar.x + 35) - p.x;
            const dy = (avatar.y + 35) - p.y;
            if (Math.sqrt(dx*dx + dy*dy) < interactionDist && (p.type === 'info' || !p.answered)) showPopup(p);
        });
    }

    function showPopup(paper) {
        isPaused = true;
        currentPaper = paper;
        popupOverlay.style.display = 'flex';
        
        document.getElementById('options-container').innerHTML = '';
        document.getElementById('feedback-area').innerHTML = '';

        // Inside function showPopup(paper)
if (paper.type === 'info') {
    document.getElementById('popup-title').innerText = "INFORMATION PAPER";
    document.getElementById('popup-text').innerText = infoContents[paper.id];
    paper.read = true;

    // Inside function showPopup(paper)
if (paper.id === 0 && images.laptop.complete) {
    popupImg.src = images.laptop.src;
    popupImg.style.display = 'block';
} else if (paper.id === 1 && images.charger.complete) { // Added for ID 1
    popupImg.src = images.charger.src;
    popupImg.style.display = 'block';
} else if (paper.id === 2 && images.printer.complete) {
    popupImg.src = images.printer.src;
    popupImg.style.display = 'block';
} else {
    popupImg.style.display = 'none';
}
} else {
            popupImg.style.display = 'none';
            document.getElementById('popup-title').innerText = "QUESTION PAPER";
            document.getElementById('popup-text').innerText = questions[paper.id].q;
            questions[paper.id].opts.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = `${idx + 1}. ${opt}`;
                btn.onclick = () => handleAnswer(idx);
                document.getElementById('options-container').appendChild(btn);
            });
        }
    }

    function handleAnswer(index) {
        if (currentPaper.answered) return;
        const qData = questions[currentPaper.id];
        currentPaper.answered = true;
        if (index === qData.correct) {
            score += 10;
            hud.innerText = `Score: ${score}/30`;
            document.getElementById('feedback-area').innerHTML = `<p class="feedback" style="color: green">Correct! +10 points</p>`;
        } else {
            document.getElementById('feedback-area').innerHTML = `<p class="feedback" style="color: #b40000">Incorrect. The answer was: ${qData.opts[qData.correct]}</p>`;
        }
    }

    function closePopup() {
        popupOverlay.style.display = 'none';
        isPaused = false;
        if (papers.every(p => p.type === 'info' ? p.read : p.answered)) {
            setTimeout(() => alert("CONGRATULATIONS! You mastered the S3 Framework!"), 300);
        }
    }

    function update() {
        if (isPaused) return;
        avatar.moving = false;

        if (keys['ArrowLeft'] && avatar.x > 0) { 
            avatar.x -= avatar.speed; 
            avatar.moving = true; 
            avatar.angle = 270; 
            avatar.lastDir = 'left';
        } else if (keys['ArrowRight'] && avatar.x < canvas.width - avatar.width) { 
            avatar.x += avatar.speed; 
            avatar.moving = true; 
            avatar.angle = 90; 
            avatar.lastDir = 'right';
        } else if (keys['ArrowUp'] && avatar.y > 0) { 
            avatar.y -= avatar.speed; 
            avatar.moving = true; 
            avatar.angle = 0; 
        } else if (keys['ArrowDown'] && avatar.y < canvas.height - avatar.height) { 
            avatar.y += avatar.speed; 
            avatar.moving = true; 
            avatar.angle = 180; 
        }
    }

    function draw() {
        if (images.background.complete) ctx.drawImage(images.background, 0, 0, 800, 600);
        else { ctx.fillStyle = "#f5f0e6"; ctx.fillRect(0, 0, 800, 600); }

        papers.forEach(p => {
            if (p.type === 'info' || !p.answered) {
                const dist = Math.sqrt(Math.pow((avatar.x + 35) - p.x, 2) + Math.pow((avatar.y + 35) - p.y, 2));
                if (dist < interactionDist) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 55, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(255, 255, 100, 0.4)"; ctx.fill();
                }

// INCREASE THESE VALUES:
        const objW = 100; // Increased from 70
        const objH = 70;  // Increased from 50

if (p.type === 'info' && p.id === 0 && images.laptop.complete) {
    ctx.drawImage(images.laptop, p.x - objW/2, p.y - objH/2, objW, objH);
} else if (p.type === 'info' && p.id === 1 && images.charger.complete) {
    // Standardized Charger Size
    ctx.drawImage(images.charger, p.x - objW/2, p.y - objH/2, objW, objH); 
} else if (p.type === 'info' && p.id === 2 && images.printer.complete) {
    // Standardized Printer Size
    ctx.drawImage(images.printer, p.x - objW/2, p.y - objH/2, objW, objH);
} else if (images.paper.complete) {
    // Keep standard paper icons for questions or other info
    ctx.drawImage(images.paper, p.x - 25, p.y - 32, 50, 65);
}
            }
        });

        let img;
        if (avatar.moving) {
            const now = Date.now();
            if (now - avatar.lastFrameSwap > 150) {
                avatar.frame = avatar.frame === 0 ? 1 : 0;
                avatar.lastFrameSwap = now;
            }
            if (avatar.frame === 0) {
                img = images.idle;
            } else {
                img = (avatar.lastDir === 'left') ? images.walkLeft : images.walkRight;
            }
        } else {
            img = images.idle;
            avatar.frame = 0;
        }
        
        if (img && img.complete) {
            ctx.save();
            ctx.translate(avatar.x + avatar.width / 2, avatar.y + avatar.height / 2);
            ctx.rotate(avatar.angle * Math.PI / 180);
            ctx.drawImage(img, -avatar.width / 2, -avatar.height / 2, avatar.width, avatar.height);
            ctx.restore();
        }
        
        requestAnimationFrame(gameLoop);
    }

    function gameLoop() { update(); draw(); }
    loadImages();
</script>
</body>
</html>
