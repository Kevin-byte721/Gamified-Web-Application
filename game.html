<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Framework - Digital Citizenship Room</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            background-color: #2c3e50; color: white; font-family: 'Arial', sans-serif;
            overflow: hidden; height: 100vh;
        }
        #game-container {
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border: 4px solid #34495e; background: #f5f0e6;
        }
        canvas { display: block; max-width: 100%; height: auto; }
        #instructions {
            position: absolute; bottom: 20px; left: 20px; color: #464646;
            font-size: 18px; pointer-events: none; background: rgba(255,255,255,0.7);
            padding: 5px 10px; border-radius: 5px;
        }
        #popup-overlay {
            display: none; position: absolute; top: 0; left: 0;
            width: 800px; height: 600px; background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center; z-index: 10;
        }
        #popup-content {
            background: #fff5b4; border: 6px solid #dcc23c; border-radius: 24px;
            width: 640px; max-height: 90%; overflow-y: auto; padding: 40px;
            color: #000; box-sizing: border-box; position: relative; text-align: center;
        }
        #popup-image {
            display: none; width: 280px; height: 180px;
            object-fit: contain; background: white;
            margin: 0 auto 20px auto; border-radius: 10px;
            border: 3px solid #dcc23c;
        }
        #popup-text { font-size: 19px; line-height: 1.5; margin-bottom: 20px; text-align: left; white-space: pre-line; }
        .option {
            background: rgba(255,255,255,0.6); margin: 10px 0; padding: 12px;
            border-radius: 8px; cursor: pointer; border: 2px solid #dcc23c;
            transition: 0.2s; text-align: left; font-size: 18px;
        }
        .option:hover { background: #fff; transform: translateX(5px); }
        .feedback { font-weight: bold; margin-top: 20px; font-size: 22px; }
        .close-hint { margin-top: 20px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="instructions">Arrows = Move | Space = Interact</div>
        
        <div id="popup-overlay">
            <div id="popup-content">
                <h2 id="popup-title">ITEM INFO</h2>
                <img id="popup-image" src="" alt="Item Image">
                <div id="popup-text"></div>
                <div id="options-container"></div>
                <div id="feedback-area"></div>
                <div class="close-hint">Press SPACE or ESC to close</div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const popupOverlay = document.getElementById('popup-overlay');
    const popupImg = document.getElementById('popup-image');
    
    const images = {};
    const imageFiles = {
        background: 'room_background.jpg',
        paper: 'paper_icon.png',
        idle: 'avatar_idle.png',
        walkLeft: 'avatar_walk_left.png',
        walkRight: 'avatar_walk_right.png',
        laptop: 'Laptop-computer.jpg',
        charger: '9f99de48-1180-4687-8339-901f66eb5f77.d934e5257ee17db8263aac956eadd381.jpg',
        printer: '204-2042717_printer-epson-color-png-download-hd-epson-printer.jpg'
    };

    let imagesLoaded = 0;
    const totalImages = Object.keys(imageFiles).length;

    function loadImages() {
        for (let key in imageFiles) {
            images[key] = new Image();
            images[key].src = imageFiles[key];
            images[key].onload = () => {
                imagesLoaded++;
                if (imagesLoaded === totalImages) gameLoop();
            };
            images[key].onerror = () => {
                imagesLoaded++;
                if (imagesLoaded === totalImages) gameLoop();
            };
        }
    }

    let isPaused = false;
    let currentPaper = null;
    const interactionDist = 100;

    const avatar = { 
        x: 400, y: 300, width: 70, height: 70, 
        speed: 5, moving: false, lastDir: 'right', angle: 0, frame: 0, lastFrameSwap: 0
    };
    const keys = {};

    const infoContents = [
        "LAPTOP: A portable computer used to access the internet. \n\nOVERVIEW: The S3 Framework stands for Safe, Savvy, and Social. It supports the nine elements of digital citizenship by providing guiding principles for safe, educated, and respectful use of technology.",
        "CHARGER: A cable that provides power to your devices. \n\nSAFE: Protecting yourself and others from harm. Just as a charger keeps a device alive, digital security and privacy prevent viruses and protect personal information.",
        "PRINTER: A machine that puts digital text and pictures onto paper. \n\nSAVVY: Creating educated digital citizens by understanding technology and making good decisions. This covers digital fluency and discerning reliable information online.",
        "SOCIAL: Respecting yourself and others as digital citizens. This involves digital etiquette, rights and responsibilities, and proper communication and collaboration.",
        "CONNECTION: The S3 Framework reinforces the nine elements such as Digital Access, Commerce, Communication, Etiquette, Law, Rights & Responsibilities, Health & Wellness, and Security."
    ];

    const questions = [
        { q: "What does the 'S3' in S3 Framework stand for?", opts: ["Safe, Secure, Social", "Safe, Savvy, Social", "Smart, Savvy, Secure", "Safe, Smart, Social"], correct: 1 },
        { q: "Which part of S3 focuses on protecting from harm?", opts: ["Savvy", "Social", "Safe", "All of them"], correct: 2 },
    ];

    const papers = [
    {x: 130, y: 140, type: 'info', id: 0, read: false}, // Laptop
    {x: 430, y: 330, type: 'info', id: 1, read: false}, // Charger
    {x: 580, y: 130, type: 'info', id: 2, read: false}, // Moved Printer away from X:650+
    {x: 690, y: 490, type: 'info', id: 3, read: false},
    {x: 240, y: 430, type: 'info', id: 4, read: false},
    {x: 150, y: 530, type: 'question', id: 0, answered: false},
    {x: 340, y: 230, type: 'question', id: 1, answered: false},
];

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if ((e.code === 'Space' || e.code === 'Escape') && isPaused) {
            if (currentPaper.type === 'info' || currentPaper.answered) closePopup();
        } else if (e.code === 'Space' && !isPaused) {
            checkInteraction();
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function checkInteraction() {
        papers.forEach(p => {
            const dx = (avatar.x + 35) - p.x;
            const dy = (avatar.y + 35) - p.y;
            if (Math.sqrt(dx*dx + dy*dy) < interactionDist && (p.type === 'info' || !p.answered)) showPopup(p);
        });
    }

    function showPopup(paper) {
        isPaused = true;
        currentPaper = paper;
        popupOverlay.style.display = 'flex';
        document.getElementById('options-container').innerHTML = '';
        document.getElementById('feedback-area').innerHTML = '';

        if (paper.type === 'info') {
            document.getElementById('popup-title').innerText = "INFORMATION";
            document.getElementById('popup-text').innerText = infoContents[paper.id];
            paper.read = true;

            if (paper.id === 0 && images.laptop.naturalWidth > 0) {
                popupImg.src = images.laptop.src; popupImg.style.display = 'block';
            } else if (paper.id === 1 && images.charger.naturalWidth > 0) {
                popupImg.src = images.charger.src; popupImg.style.display = 'block';
            } else if (paper.id === 2 && images.printer.naturalWidth > 0) {
                popupImg.src = images.printer.src; popupImg.style.display = 'block';
            } else { popupImg.style.display = 'none'; }
        } else {
            popupImg.style.display = 'none';
            document.getElementById('popup-title').innerText = "QUESTION";
            document.getElementById('popup-text').innerText = questions[paper.id].q;
            questions[paper.id].opts.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = `${idx + 1}. ${opt}`;
                btn.onclick = () => handleAnswer(idx);
                document.getElementById('options-container').appendChild(btn);
            });
        }
    }

    function handleAnswer(index) {
        if (currentPaper.answered) return;
        const qData = questions[currentPaper.id];
        currentPaper.answered = true;
        if (index === qData.correct) {
            document.getElementById('feedback-area').innerHTML = `<p class="feedback" style="color: green">Correct!</p>`;
        } else {
            document.getElementById('feedback-area').innerHTML = `<p class="feedback" style="color: #b40000">Incorrect. The answer was: ${qData.opts[qData.correct]}</p>`;
        }
    }

    function closePopup() {
        popupOverlay.style.display = 'none';
        isPaused = false;
        if (papers.every(p => p.type === 'info' ? p.read : p.answered)) {
            setTimeout(() => alert("CONGRATULATIONS! You completed the module!"), 300);
        }
    }

    function update() {
    if (isPaused) return;

    let nextX = avatar.x;
    let nextY = avatar.y;
    avatar.moving = false;

    // Determine intended next position
    if (keys['ArrowLeft'] && avatar.x > 0) { 
        nextX -= avatar.speed; avatar.moving = true; avatar.angle = 270; avatar.lastDir = 'left'; 
    }
    else if (keys['ArrowRight'] && avatar.x < canvas.width - avatar.width) { 
        nextX += avatar.speed; avatar.moving = true; avatar.angle = 90; avatar.lastDir = 'right'; 
    }
    else if (keys['ArrowUp'] && avatar.y > 0) { 
        nextY -= avatar.speed; avatar.moving = true; avatar.angle = 0; 
    }
    else if (keys['ArrowDown'] && avatar.y < canvas.height - avatar.height) { 
        nextY += avatar.speed; avatar.moving = true; avatar.angle = 180; 
    }

    // --- COLLISION CHECK ---
    // Define the "No-Walk" zone based on your coordinates:
    // Min X: 649, Max X: 891 | Min Y: 178, Max Y: 393
    const isColliding = (nextX + avatar.width > 649 && nextX < 891 && 
                         nextY + avatar.height > 178 && nextY < 393);

    if (!isColliding) {
        avatar.x = nextX;
        avatar.y = nextY;
    } else {
        avatar.moving = false; // Stop animation if hitting a wall
    }
}

    function draw() {
        // Draw Background
        if (images.background.naturalWidth > 0) ctx.drawImage(images.background, 0, 0, 800, 600);
        else { ctx.fillStyle = "#f5f0e6"; ctx.fillRect(0, 0, 800, 600); }

        papers.forEach(p => {
            if (p.type === 'info' || !p.answered) {
                const dist = Math.sqrt(Math.pow((avatar.x + 35) - p.x, 2) + Math.pow((avatar.y + 35) - p.y, 2));
                if (dist < interactionDist) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 65, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(255, 255, 100, 0.4)"; ctx.fill();
                }

                const objW = 100;
                const objH = 70;

                if (p.type === 'info' && p.id === 0 && images.laptop.naturalWidth > 0) {
                    ctx.drawImage(images.laptop, p.x - objW/2, p.y - objH/2, objW, objH);
                } else if (p.type === 'info' && p.id === 1 && images.charger.naturalWidth > 0) {
                    ctx.drawImage(images.charger, p.x - objW/2, p.y - objH/2, objW, objH);
                } else if (p.type === 'info' && p.id === 2 && images.printer.naturalWidth > 0) {
                    ctx.drawImage(images.printer, p.x - objW/2, p.y - objH/2, objW, objH);
                } else if (images.paper.naturalWidth > 0) {
                    ctx.drawImage(images.paper, p.x - 25, p.y - 32, 50, 65);
                } else {
                    // Placeholder if paper image fails
                    ctx.fillStyle = "#fff"; ctx.fillRect(p.x - 15, p.y - 20, 30, 40);
                }
            }
        });

        // Draw Avatar
        let img;
        if (avatar.moving) {
            const now = Date.now();
            if (now - avatar.lastFrameSwap > 150) { avatar.frame = avatar.frame === 0 ? 1 : 0; avatar.lastFrameSwap = now; }
            img = (avatar.frame === 0) ? images.idle : (avatar.lastDir === 'left' ? images.walkLeft : images.walkRight);
        } else { img = images.idle; }
        
        if (img && img.naturalWidth > 0) {
            ctx.save();
            ctx.translate(avatar.x + 35, avatar.y + 35);
            ctx.rotate(avatar.angle * Math.PI / 180);
            ctx.drawImage(img, -35, -35, 70, 70);
            ctx.restore();
        } else {
            ctx.fillStyle = "red"; ctx.fillRect(avatar.x, avatar.y, 70, 70);
        }
        requestAnimationFrame(gameLoop);
    }

    function gameLoop() { update(); draw(); }
    loadImages();
</script>
</body>
</html>
