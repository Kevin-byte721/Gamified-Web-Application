<script>
const API_BASE = window.location.origin;
let userIsWindowInactive = false; 

let laptopAttempts = { room1: 0, room2: 0, room3: 0 };
let printerAttempts = { room1: 0, room2: 0, room3: 0 };
let aiDialogueMessageOverride = "";

document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        userIsWindowInactive = true;
        if (typeof isAuthenticated !== 'undefined' && isAuthenticated) {
            console.log("[SYSTEM] Window backgrounded. Securing persistence status.");
            if (typeof syncPlayerCoordinates === 'function') syncPlayerCoordinates();
        }
    } else {
        userIsWindowInactive = false;
        if (typeof isAuthenticated !== 'undefined' && isAuthenticated) {
            console.log("[SYSTEM] Window focused. Resuming telemetry tracking loop.");
            if (typeof syncPlayerCoordinates === 'function') syncPlayerCoordinates();
        }
    }
});

function dispatchDisconnectBeacon() {
    if (typeof isAuthenticated === 'undefined' || !isAuthenticated || !currentStudentNumber) {
        return;
    }
    
    const disconnectUrl = `${API_BASE}/api/multiplayer/leave`;
    const payload = JSON.stringify({
        studentNumber: currentStudentNumber.trim().toUpperCase()
    });
    
    if (navigator.sendBeacon) {
        navigator.sendBeacon(disconnectUrl, payload);
    } else {
        fetch(disconnectUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: payload,
            keepalive: true
        }).catch(() => {});
    }
}

window.addEventListener("beforeunload", () => {
    dispatchDisconnectBeacon();
});

window.addEventListener("pagehide", () => {
    dispatchDisconnectBeacon();
});
let isSafeCompleted = false;
let isSavvyCompleted = false;
let isSocialCompleted = false;
let hasCompletedAllTasks = false; 

function getSpawnRoomByScore(score) {
    if (score >= 60) return 'room3';
    if (score >= 30) return 'room2';
    return 'room1';
}

document.addEventListener("DOMContentLoaded", () => {
    const loginBtn = document.getElementById('login-submit-btn');
    const inputField = document.getElementById('student-number-input');
    const errorMsg = document.getElementById('login-error-msg');
    const loginContainer = document.getElementById('login-container');
    const startPrompt = document.getElementById('start-prompt');
    const exitGameBtn = document.getElementById('exit-game-btn');
    const settingsOverlay = document.getElementById('settings-overlay');

    loginBtn.addEventListener('click', () => {
        const studentId = inputField.value.trim().toUpperCase();

        if (studentId === "") {
            errorMsg.textContent = "⚠ Student number cannot be blank.";
            errorMsg.style.display = 'block';
            return;
        }

        fetch(`${API_BASE}/api/auth`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentNumber: studentId })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Could not authenticate student record with cloud services.");
            }
            return response.json();
        })
        .then(authResult => {
            if (!authResult.authenticated || !authResult.data) {
                throw new Error("Authentication rejected by cloud database schema.");
            }

            const record = authResult.data;
            const safe = record.safe_score || 0;
            const savvy = record.savvy_score || 0;
            const social = record.social_score || 0;
            cyberknowledgeScore = safe + savvy + social;

            isSafeCompleted = record.safe_completed === 1 || safe >= 20;
            isSavvyCompleted = record.savvy_completed === 1 || savvy >= 20;
            isSocialCompleted = record.social_completed === 1 || social >= 20;

            if (isSafeCompleted && isSavvyCompleted && isSocialCompleted) {
                hasCompletedAllTasks = true;
            } else {
                hasCompletedAllTasks = false;
            }

            const roomSelection = prompt("Enter a Room Code to join or create (e.g., ROOM1):", "ROOM1");
            if (!roomSelection) {
                alert("A room code is required for multiplayer mapping functionality.");
                return;
            }

            const targetRoomCode = roomSelection.trim().toUpperCase();
            const temporaryRoomId = getSpawnRoomByScore(cyberknowledgeScore);

            return fetch(`${API_BASE}/api/multiplayer/join-room`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    studentNumber: studentId, 
                    roomCode: targetRoomCode, 
                    roomId: temporaryRoomId 
                })
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(errData => { throw new Error(errData.error || "Room admission failed"); });
                }
                return res.json();
            })
            .then(roomData => {
                currentStudentNumber = studentId;
                currentRoomCode = targetRoomCode;
                currentRoomId = roomData.roomId || temporaryRoomId; 

                const activeConfig = roomConfigurations[currentRoomId] || roomConfigurations.room1;
                
                avatar.x = activeConfig.spawnX; 
                avatar.y = activeConfig.spawnY;
                avatar.angle = activeConfig.cutscene?.directionAngle || 180;

                if (activeConfig.aiNPC) {
                    aiAvatar.x = activeConfig.aiNPC.x;
                    aiAvatar.y = activeConfig.aiNPC.y;
                    aiAvatar.angle = activeConfig.aiNPC.angle || 0;
                }
                
                applyRoomCompletionStates(currentRoomId);
                
                isCutsceneActive = true;
                cutsceneStartTime = Date.now();
                isAuthenticated = true; 
                
                errorMsg.style.display = 'none';
                loginContainer.style.display = 'none';
                startPrompt.style.display = 'block';
            });
        })
        .catch(err => {
            currentStudentNumber = "";
            currentRoomCode = "";
            isAuthenticated = false;
            cyberknowledgeScore = 0;
            isSafeCompleted = false;
            isSavvyCompleted = false;
            isSocialCompleted = false;
            hasCompletedAllTasks = false;

            errorMsg.textContent = `⚠ ${err.message}`;
            errorMsg.style.display = 'block';
        });
    });

    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loginBtn.click();
    });

    if (exitGameBtn) {
        exitGameBtn.addEventListener('click', () => {
            if (!confirm("Are you sure you want to exit the current game session?")) {
                return;
            }

            dispatchDisconnectBeacon();

            isAuthenticated = false;
            currentStudentNumber = "";
            currentRoomCode = "";
            currentRoomId = "room1";
            cyberknowledgeScore = 0;
            isSafeCompleted = false;
            isSavvyCompleted = false;
            isSocialCompleted = false;
            hasCompletedAllTasks = false;
            remotePlayers = {}; 

            gameState = 'menu';
            isPaused = false;

            if (settingsOverlay) settingsOverlay.style.display = 'none';
            if (startPrompt) startPrompt.style.display = 'none';
            
            if (inputField) inputField.value = "";
            if (errorMsg) errorMsg.style.display = 'none';
            if (loginContainer) loginContainer.style.display = 'block';

            window.location.reload();
        });
    }
});

function transitionToRoom(roomId) {
    if (fadeState !== 'idle') return;

    if (currentRoomId === 'room1' && roomId === 'room2') {
        if (cyberknowledgeScore >= 60) {
            targetRoomId = 'room3';
        } else {
            targetRoomId = 'room2';
        }
    } else {
        targetRoomId = roomId;
    }

    fadeState = 'out';
}

function applyRoomCompletionStates(roomId) {
    const config = roomConfigurations[roomId];
    if (!config) return;

    let isCurrentModuleCompleted = false;
    if (roomId === 'room1' && isSafeCompleted) isCurrentModuleCompleted = true;
    if (roomId === 'room2' && isSavvyCompleted) isCurrentModuleCompleted = true;
    if (roomId === 'room3' && isSocialCompleted) isCurrentModuleCompleted = true;

    if (isCurrentModuleCompleted) {
        laptopLocked = true;
        if (config.papers) {
            config.papers.forEach(paper => {
                paper.answered = true;
                paper.scoreProcessed = true;
                paper.hasConsultedAI = true; 
            });
        }
        aiAvatar.messageType = `${roomId}_success`; 
    } else {
        laptopLocked = true; 
        aiAvatar.messageType = config.aiNPC.messageType;
        
        if (config.papers) {
            config.papers.forEach(paper => {
                paper.answered = false;
                paper.scoreProcessed = false;
                paper.hasConsultedAI = false; 
            });
        }
    }
}

function executeRoomSwitch(roomId) {
    currentRoomId = roomId;
    const config = roomConfigurations[roomId];

    if (!config) {
        console.error(`[EXECUTE SWITCH ERROR] Configurations do not exist for: ${roomId}`);
        return;
    }

    aiAvatar.x = config.aiNPC.x;
    aiAvatar.y = config.aiNPC.y;
    aiAvatar.angle = config.aiNPC.angle || 0; 
    
    applyRoomCompletionStates(roomId);

    avatar.x = config.spawnX;
    avatar.y = config.spawnY;
    avatar.angle = config.cutscene?.directionAngle || 180;

    isCutsceneActive = true;
    cutsceneStartTime = Date.now();

    const badge = document.getElementById('ai-attention-badge');
    if (badge) {
        badge.style.display = 'block';
    }

    if (typeof updateAttentionBadgePosition === 'function') {
        updateAttentionBadgePosition();
    }
}

function syncPlayerCoordinates() {
    if (typeof isAuthenticated === 'undefined' || !isAuthenticated || !currentStudentNumber || !currentRoomCode) {
        return; 
    }

    fetch(`${API_BASE}/api/multiplayer/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            studentNumber: currentStudentNumber.trim().toUpperCase(),
            roomCode: currentRoomCode.trim().toUpperCase(),
            roomId: currentRoomId || 'room1', 
            x: avatar.x,
            y: avatar.y,
            angle: avatar.angle,
            moving: avatar.moving,
            animStep: avatar.frame || 0,
            isInactive: userIsWindowInactive 
        })
    })
    .then(res => {
        if (!res.ok) throw new Error(`HTTP network error: ${res.status}`);
        return res.json();
    })
    .then(data => {
        if (data && data.players) {
            remotePlayers = data.players;
        }
    })
    .catch(err => console.error("Multiplayer heartbeat synchronization failed:", err));
}

setInterval(() => {
    if (gameState === 'game' && typeof isAuthenticated !== 'undefined' && isAuthenticated) {
        if (typeof syncPlayerCoordinates === 'function') {
            syncPlayerCoordinates();
        }
    }
}, 150);

const ctx = canvas.getContext('2d');
const popupOverlay = document.getElementById('popup-overlay');

let currentRoomCode = "";

let gameState = 'title';

const sounds = {

};

sounds.walking.loop = true;
sounds.walking.volume = 1;

function loadImages() {
    for (let key in imageFiles) {
        images[key] = new Image();
        images[key].src = imageFiles[key];
                
        images[key].onload = () => { 
             if (++imagesLoaded === totalImages) {
                draw(); 
            } 
         };
        images[key].onerror = () => {
            if (++imagesLoaded === totalImages) {
                draw(); 
            }
        };
    }
}

};

    height: 70,
    angle: 180,         
    radius: 45          
};

const keys = {};
let cyberknowledgeScore = 60;
let selectedEmailOption = 0;

let currentStudentNumber = "";
let isAuthenticated = false;

    debugMode = isEnabled;
}

function showSettingsMenu() {
    const settingsOverlay = document.getElementById('settings-overlay');
    
    if (!settingsOverlay) return;

    const isCurrentlyVisible = settingsOverlay.style.display === 'flex';
    if (!isCurrentlyVisible) {
        isPaused = true;
        settingsOverlay.style.display = 'flex';
    } else {
        isPaused = false;
        settingsOverlay.style.display = 'none';
    }
}

function updateGameVolume(value) {
    const volumeValSpan = document.getElementById('volume-val');
    if (volumeValSpan) {
        volumeValSpan.innerText = value + '%';
    }
    const volumeLevel = value / 100;
    if (sounds && sounds.walking) {
        sounds.walking.volume = volumeLevel;
    }
}

function draw() {
    if (typeof skipTitleScreen !== 'undefined' && skipTitleScreen && gameState === 'title') {
        if (typeof currentStudentNumber === 'undefined' || !currentStudentNumber) {
            currentStudentNumber = "DEBUG_USER_001";
        }
        if (typeof currentRoomCode === 'undefined' || !currentRoomCode) {
            currentRoomCode = "DEBUG_ROOM";
        }

        isAuthenticated = true;
        gameState = 'game';
        isPaused = false;

        const menuOverlay = document.getElementById('menu-overlay');
        if (menuOverlay) menuOverlay.style.display = 'none';
        
        currentRoomId = getSpawnRoomByScore(cyberknowledgeScore);
        const currentConfig = roomConfigurations[currentRoomId] || roomConfigurations.room1;

        if (currentConfig.aiNPC) {
            aiAvatar.x = currentConfig.aiNPC.x;
            aiAvatar.y = currentConfig.aiNPC.y;
            aiAvatar.angle = currentConfig.aiNPC.angle || 0;
        }

        avatar.x = currentConfig.spawnX;
        avatar.y = currentConfig.spawnY;
        avatar.angle = (roomConfigurations[currentRoomId]?.cutscene?.directionAngle !== undefined) 
            ? roomConfigurations[currentRoomId].cutscene.directionAngle 
            : 90;
        
        isCutsceneActive = true;
        cutsceneStartTime = Date.now();
        
        const badge = document.getElementById('ai-attention-badge');
        if (badge) badge.style.display = 'block';

        if (typeof updateAttentionBadgePosition === 'function') {
            updateAttentionBadgePosition();
        }
    }

    if (gameState === 'title') {
        drawTitleScreen();
        requestAnimationFrame(draw);
        return;
    }

    ctx.clearRect(0, 0, 800, 600);
        
    const activeRoomConfig = roomConfigurations[currentRoomId];
    const activeBgImage = images[activeRoomConfig?.bgKey];

    if (activeBgImage && activeBgImage.naturalWidth > 0) {
        ctx.drawImage(activeBgImage, 0, 0, 800, 600);
    }

    // --- PRINTER DEVICE DRAWING & INTERACTION ---
    if (activeRoomConfig?.printerDevice) {
        const printer = activeRoomConfig.printerDevice;

        if (images.printer && images.printer.naturalWidth > 0) {
            ctx.save();
            ctx.translate(printer.x, printer.y);
            if (printer.angle) ctx.rotate(printer.angle * Math.PI / 180);
            ctx.drawImage(
                images.printer, 
                -PRINTER_WIDTH / 2, 
                -PRINTER_HEIGHT / 2, 
                PRINTER_WIDTH, 
                PRINTER_HEIGHT
            );
            ctx.restore();
        }

        const pDx = (avatar.x + 35) - printer.x;
        const pDy = (avatar.y + 35) - printer.y;
        const printerDist = Math.sqrt(pDx * pDx + pDy * pDy);

        if (printerDist < interactionDist) {
            ctx.save();
            ctx.translate(printer.x, printer.y);
            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 3;
            ctx.strokeRect(
                -(PRINTER_WIDTH / 2 + 5), 
                -(PRINTER_HEIGHT / 2 + 5), 
                PRINTER_WIDTH + 10, 
                PRINTER_HEIGHT + 10
            );
            ctx.restore();
        }
    }

    // --- SHREDDER DEVICE DRAWING ---
    if (activeRoomConfig?.shredderDevice) {
        const shredder = activeRoomConfig.shredderDevice;

        if (images.paper_shredder && images.paper_shredder.naturalWidth > 0) {
            ctx.save();
            ctx.translate(shredder.x, shredder.y);
            if (shredder.angle) ctx.rotate(shredder.angle * Math.PI / 180);
            ctx.drawImage(
                images.paper_shredder, 
                -SHREDDER_WIDTH / 2, 
                -SHREDDER_HEIGHT / 2, 
                SHREDDER_WIDTH, 
                SHREDDER_HEIGHT
            );
            ctx.restore();
        }
    }

    // --- ROUTER DEVICES DRAWING & INTERACTION ---
    const activeRouters = activeRoomConfig?.routers || (activeRoomConfig?.routerDevice ? [activeRoomConfig.routerDevice] : []);
    activeRouters.forEach(router => {
        if (images.router && images.router.naturalWidth > 0) {
            ctx.save();
            ctx.translate(router.x, router.y);
            if (router.angle) {
                ctx.rotate(router.angle * Math.PI / 180);
            }
            ctx.drawImage(
                images.router, 
                -ROUTER_WIDTH / 2, 
                -ROUTER_HEIGHT / 2, 
                ROUTER_WIDTH, 
                ROUTER_HEIGHT
            );
            ctx.restore();
        }

        // Router proximity highlight
        const rDx = (avatar.x + 35) - router.x;
        const rDy = (avatar.y + 35) - router.y;
        const routerDist = Math.sqrt(rDx * rDx + rDy * rDy);
    });

    // --- PAPERS / LAPTOPS ---
    const activePapers = activeRoomConfig?.papers || [];
    activePapers.forEach(p => {
        if (images.laptopEmail && images.laptopEmail.naturalWidth > 0) {
            ctx.save();
            ctx.translate(p.x, p.y);
            if (p.angle) {
                ctx.rotate(p.angle * Math.PI / 180);
            }
            ctx.drawImage(images.laptopEmail, -50, -35, 100, 70);
            ctx.restore();
        }
                
        const dx = (avatar.x + 35) - p.x;
        const dy = (avatar.y + 35) - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < interactionDist) {
            ctx.save();
            ctx.translate(p.x, p.y);
            if (p.angle) {
                ctx.rotate(p.angle * Math.PI / 180);
            }
            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 3;
            ctx.strokeRect(-55, -40, 110, 80);
            ctx.restore();
        }
    });

    // --- REMOTE PLAYERS ---
    if (typeof remotePlayers !== 'undefined' && remotePlayers) {
        Object.keys(remotePlayers).forEach(id => {
            if (id.trim().toUpperCase() === currentStudentNumber.trim().toUpperCase()) return; 
            const peer = remotePlayers[id];
            
            if (peer.roomCode === currentRoomCode && peer.roomId === currentRoomId) {
                ctx.save();
                ctx.translate(peer.x + 35, peer.y + 35);
                ctx.rotate((peer.angle || 0) * Math.PI / 180);
                
                let peerSprite = images.idle;
                if (peer.moving) {
                    peerSprite = (Math.floor(Date.now() / 150) % 2 === 0) ? images.walkLeft : images.walkRight;
                }
                
                if (peerSprite && peerSprite.complete) {
                    ctx.drawImage(peerSprite, -35, -35, 70, 70);
                } else {
                    ctx.fillStyle = '#9b59b6'; 
                    ctx.fillRect(-25, -25, 50, 50);
                }
                ctx.restore();

                ctx.font = "bold 9px Arial";
                const textWidth = ctx.measureText(peer.studentNumber).width;
                const paddingX = 8;
                const boxWidth = textWidth + paddingX;
                const boxHeight = 14;
                
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(peer.x + 35 - (boxWidth / 2), peer.y - 26, boxWidth, boxHeight);
                
                ctx.fillStyle = "#52b788"; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(peer.studentNumber, peer.x + 35, peer.y - 26 + (boxHeight / 2));
            }
        });
    }

    // --- LOCAL PLAYER ANIMATION ---
    let localNow = Date.now();
    let img;

    if (avatar.moving) {
        let currentSpeed = avatar.speed || 4;
        let dynamicInterval = Math.max(60, 600 / currentSpeed);

        if (localNow - avatar.lastFrameSwap > dynamicInterval) {
            if (typeof avatar.animStep === 'undefined') avatar.animStep = 0;
            avatar.animStep = (avatar.animStep + 1) % 4;
            avatar.lastFrameSwap = localNow;
        }

        if (avatar.animStep === 0) {
            img = images.walkLeft;
        } else if (avatar.animStep === 2) {
            img = images.walkRight;
        } else {
            img = images.idle;
        }
    } else {
        img = images.idle;
    }
        
    if (img && img.naturalWidth > 0) {
        ctx.save();                
        ctx.translate(avatar.x + 35, avatar.y + 35);                
        ctx.rotate(avatar.angle * Math.PI / 180);
        ctx.drawImage(img, -35, -35, 70, 70);
        ctx.restore();
    }

    // --- AI NPC ---
    if (activeRoomConfig?.aiNPC && images.aiNPC && images.aiNPC.naturalWidth > 0) {
        ctx.save();
        ctx.translate(aiAvatar.x + 35, aiAvatar.y + 35);
        let correctedAngle = (aiAvatar.angle || 0) + 180;
        ctx.rotate(correctedAngle * Math.PI / 180);
        ctx.drawImage(images.aiNPC, -35, -35, 70, 70);
        ctx.restore();
    }

    // --- STUDENT NUMBER OVERLAY ---
    if (typeof isAuthenticated !== 'undefined' && isAuthenticated && currentStudentNumber) {
        ctx.font = "bold 9px Arial";
        const localTextWidth = ctx.measureText(currentStudentNumber).width;
        const localPaddingX = 8;
        const localBoxWidth = localTextWidth + localPaddingX;
        const localBoxHeight = 14;

        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(avatar.x + 35 - (localBoxWidth / 2), avatar.y - 26, localBoxWidth, localBoxHeight);
        
        ctx.fillStyle = "#52b788"; 
        ctx.font = "bold 9px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = 'middle';
        ctx.fillText(currentStudentNumber, avatar.x + 35, avatar.y - 26 + (localBoxHeight / 2));
    }

    // --- DEBUG COLLISION ZONES ---
    if (typeof debugMode !== 'undefined' && debugMode) {
        ctx.lineWidth = 2;
        const currentZones = activeRoomConfig?.collisionZones || [];
        currentZones.forEach(z => {
            ctx.save();
            if (z.type === 'circle') {
                ctx.beginPath();
                ctx.arc(z.x, z.y, z.radius, 0, Math.PI * 2);
                ctx.strokeStyle = "red";
                ctx.stroke();
                ctx.fillStyle = "rgba(255, 0, 0, 0.15)";
                ctx.fill();
            } else {
                ctx.translate(z.x, z.y);
                if (z.deg) {
                    ctx.rotate(z.deg * Math.PI / 180);
                }
                ctx.strokeStyle = "red";
                ctx.strokeRect(0, 0, z.w, z.h);
                ctx.fillStyle = "rgba(255, 0, 0, 0.15)";
                ctx.fillRect(0, 0, z.w, z.h);
            }
            ctx.restore();
        });
    }

    // --- SCORE OVERLAY ---
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(580, 10, 210, 40);
    ctx.strokeStyle = "#dcc23c";
    ctx.lineWidth = 2;
    ctx.strokeRect(580, 10, 210, 40);

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "left";
    ctx.fillText(`Cyberknowledge: ${cyberknowledgeScore}`, 595, 36);

    const inst = document.getElementById('instructions');
    if (inst) {
        const structuralVisibility = (typeof showGuideControls !== 'undefined' && !showGuideControls) ? 'none' : 'block';
        if (inst.style.display !== structuralVisibility) {
            inst.style.display = structuralVisibility;
        }
    }

    if (!isPaused) {
        update();
    }

    // --- ROOM TRANSITION FADE ---
    if (fadeState === 'out') {
        fadeAlpha += 0.05;
        if (fadeAlpha >= 1) {
            fadeAlpha = 1;
            executeRoomSwitch(targetRoomId);
            fadeState = 'in';
        }
    } else if (fadeState === 'in') {
        fadeAlpha -= 0.05;
        if (fadeAlpha <= 0) {
            fadeAlpha = 0;
            fadeState = 'idle';
            targetRoomId = null;
        }
    }

    if (fadeAlpha > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
        ctx.fillRect(0, 0, 800, 600);
    }

    requestAnimationFrame(draw);
}

function checkInteraction() {
    const activePapers = roomConfigurations[currentRoomId]?.papers || [];

    for (let p of activePapers) {
        const dx = (avatar.x + 35) - p.x;
        const dy = (avatar.y + 35) - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < interactionDist) {
            interactWithLaptop(p);
            return;
        }
    }

    const aiDx = (avatar.x + 35) - (aiAvatar.x + 35);
    const aiDy = (avatar.y + 35) - (aiAvatar.y + 35);
    const distanceToAI = Math.sqrt(aiDx * aiDx + aiDy * aiDy);
    
    if (distanceToAI < 100) {
        showAIDialoguePopup();
    }
}

function updateAttentionBadgePosition() {
    const badge = document.getElementById('ai-attention-badge');
    if (!badge) return;

    const currentConfig = roomConfigurations[currentRoomId];
    if (!currentConfig) return;

    const activePapers = currentConfig.papers || [];
    const terminalState = activePapers[0];

    if (currentConfig.hasSeenRoomIntro === undefined) currentConfig.hasSeenRoomIntro = false;
    if (currentConfig.hasSeenLaptopFeedback === undefined) currentConfig.hasSeenLaptopFeedback = false;
    if (currentConfig.hasSeenPrinterFeedback === undefined) currentConfig.hasSeenPrinterFeedback = false;

    let shouldShowBadge = false;

    if (currentConfig.pendingLaptopRetry || currentConfig.pendingPrinterRetry) {
        shouldShowBadge = true;
    } 
    else if (!terminalState || !terminalState.answered) {
        if (!currentConfig.hasSeenRoomIntro) shouldShowBadge = true;
    } else if (terminalState && terminalState.answered && !hasCompletedPrinterTask) {
        if (!currentConfig.hasSeenLaptopFeedback) shouldShowBadge = true;
    } else if (hasCompletedPrinterTask) {
        if (!currentConfig.hasSeenPrinterFeedback) shouldShowBadge = true;
    }

    if (!shouldShowBadge) {
        badge.style.display = 'none';
        return;
    }

    badge.style.display = 'block';

    const canvasWidth = 800;
    const canvasHeight = 550;
    
    const leftPercent = (((aiAvatar.x + 35) / canvasWidth) * 100);
    const topPercent = (((aiAvatar.y - 60) / canvasHeight) * 100); 
    
    badge.style.left = `${leftPercent}%`;
    badge.style.top = `${topPercent}%`;
}



let selectedPrinterOption = 0; 
window.addEventListener('keydown', e => {
    if (typeof isCutsceneActive !== 'undefined' && isCutsceneActive) {
        if (gameState !== 'title' && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyW', 'KeyS', 'KeyA', 'KeyD', 'Space'].includes(e.code)) {
            e.preventDefault();
            return false;
        }
    }

    if (gameState === 'title') {
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();

            if (typeof isAuthenticated !== 'undefined' && !isAuthenticated) {
                const inputField = document.getElementById('student-number-input');
                if (inputField) {
                    inputField.focus();
                    inputField.style.borderColor = '#ff4a4a';
                }
                return;
            }

            gameState = 'game';
            document.getElementById('menu-overlay').style.display = 'none';
            
            currentRoomId = getSpawnRoomByScore(cyberknowledgeScore);
            const currentConfig = roomConfigurations[currentRoomId] || roomConfigurations.room1;

            avatar.x = currentConfig.spawnX;
            avatar.y = currentConfig.spawnY;
            avatar.angle = currentConfig.cutscene?.directionAngle || 180; 
            
            isCutsceneActive = true;
            cutsceneStartTime = Date.now(); 

            const instElement = document.getElementById('instructions');
            if (instElement) {
                instElement.style.display = (typeof showGuideControls !== 'undefined' && showGuideControls) ? 'block' : 'none';
            }
            
            const badge = document.getElementById('ai-attention-badge');
            if (badge) {
                badge.style.display = 'block';
            }
        }
        return;
    }

    if (e.code === 'KeyT') {
        if (gameState === 'title') {
            if (typeof isAuthenticated !== 'undefined' && !isAuthenticated) return;

            gameState = 'game';
            document.getElementById('menu-overlay').style.display = 'none';
            
            currentRoomId = getSpawnRoomByScore(cyberknowledgeScore);
            const currentConfig = roomConfigurations[currentRoomId] || roomConfigurations.room1;

            avatar.x = currentConfig.spawnX;
            avatar.y = currentConfig.spawnY;
            avatar.angle = currentConfig.cutscene?.directionAngle || 180;
            isCutsceneActive = true;
            cutsceneStartTime = Date.now();

            const instElement = document.getElementById('instructions');
            if (instElement) {
                instElement.style.display = (typeof showGuideControls !== 'undefined' && showGuideControls) ? 'block' : 'none';
            }
            const badge = document.getElementById('ai-attention-badge');
            if (badge) badge.style.display = 'block';
        } else if (gameState === 'game') {
            gameState = 'title';
            document.getElementById('menu-overlay').style.display = 'flex';
            document.getElementById('instructions').style.display = 'none';
            
            const badge = document.getElementById('ai-attention-badge');
            if (badge) badge.style.display = 'none';
        }
        return;
    }

    if (e.code === 'KeyG') {
        showGuideControls = !showGuideControls;
        const instructionsElement = document.getElementById('instructions');
        if (instructionsElement) {
            instructionsElement.style.display = (showGuideControls && gameState === 'game') ? 'block' : 'none';
        }
        return;
    }

    if (gameState === 'game') {
        keys[e.code] = true;

        if (isPaused) {
            if (showingAIDialogue) {
                if (e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
                    e.preventDefault();
                    closePopup();
                }
                return;
            }

            if (currentPaper) {
                if (currentPaper.type === 'printer_document') {
                    if (!currentPaper.answered) {
                        // Move Selection Down
                        if (e.code === 'ArrowDown' || e.code === 'KeyS') { 
                            e.preventDefault();
                            selectedPrinterOption = 1; 
                            if (typeof window.updatePrinterUI === 'function') window.updatePrinterUI(); 
                        }
                        // Move Selection Up
                        if (e.code === 'ArrowUp' || e.code === 'KeyW') { 
                            e.preventDefault();
                            selectedPrinterOption = 0; 
                            if (typeof window.updatePrinterUI === 'function') window.updatePrinterUI(); 
                        }
                        // Confirm Answer with Space (or Enter)
                        if (e.code === 'Space' || e.code === 'Enter') {
                            e.preventDefault();
                            if (typeof window.handlePrinterSubmission === 'function') {
                                window.handlePrinterSubmission(selectedPrinterOption);
                            }
                        }
                    } else {
                        if (e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
                            e.preventDefault();
                            closePopup();
                        }
                    }
                } 
                else if (currentPaper.type === 'chat') {
                    if (!currentPaper.answered) {
                        // Move Selection Down
                        if (e.code === 'ArrowDown' || e.code === 'KeyS') { 
                            e.preventDefault();
                            selectedChatOption = 1; 
                            if (typeof updateChatUI === 'function') updateChatUI(); 
                        }
                        // Move Selection Up
                        if (e.code === 'ArrowUp' || e.code === 'KeyW') { 
                            e.preventDefault();
                            selectedChatOption = 0; 
                            if (typeof updateChatUI === 'function') updateChatUI(); 
                        }
                        // Confirm Answer with Space (or Enter)
                        if (e.code === 'Space' || e.code === 'Enter') {
                            e.preventDefault();
                            if (typeof window.submitChatMessage === 'function') {
                                window.submitChatMessage(selectedChatOption);
                            }
                        }
                    } else {
                        if (e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
                            e.preventDefault();
                            closePopup();
                        }
                    }
                }
                else {
                    if (!currentPaper.answered) {
                        // Move Selection Down
                        if (e.code === 'ArrowDown' || e.code === 'KeyS') { 
                            e.preventDefault();
                            selectedEmailOption = 1; 
                            if (typeof updateEmailUI === 'function') updateEmailUI(); 
                        }
                        // Move Selection Up
                        if (e.code === 'ArrowUp' || e.code === 'KeyW') { 
                            e.preventDefault();
                            selectedEmailOption = 0; 
                            if (typeof updateEmailUI === 'function') updateEmailUI(); 
                        }
                        // Confirm Answer with Space (or Enter)
                        if (e.code === 'Space' || e.code === 'Enter') {
                            e.preventDefault();
                            if (typeof window.handleEmailSubmission === 'function') {
                                window.handleEmailSubmission(selectedEmailOption);
                            }
                        }
                    } else {
                        if (e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
                            e.preventDefault();
                            closePopup();
                        }
                    }
                }
                
                if (e.code === 'Escape') { 
                    e.preventDefault();
                    closePopup(); 
                }
                return;
            }
            
            if (!showingAIDialogue && !currentPaper) {
                if (e.code === 'Space' || e.code === 'Escape' || e.code === 'Enter') {
                    e.preventDefault();
                    closePopup();
                }
                return;
            }
        }

        // Interact with Object (Printer / Workstation) using Space or KeyE
        if ((e.code === 'Space' || e.code === 'KeyE') && !isPaused) {
            e.preventDefault();
            
            const activeRoomConfig = roomConfigurations[currentRoomId];
            if (activeRoomConfig && activeRoomConfig.printerDevice) {
                const pX = activeRoomConfig.printerDevice.x;
                const pY = activeRoomConfig.printerDevice.y;
                const dx = (avatar.x + 35) - pX;
                const dy = (avatar.y + 35) - pY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < interactionDist) {
                    interactWithPrinter();
                    return; 
                }
            }
            checkInteraction();
        }

        if (e.code === 'Escape' && !isPaused) {
            e.preventDefault();
            Object.keys(keys).forEach(key => keys[key] = false);
            avatar.moving = false;
            showSettingsMenu();
        }
    }
});

    const popupContent = document.getElementById('popup-content');
    
    if (popupOverlay && popupContent) {
        popupContent.className = ''; 
        popupContent.classList.add('center-modal-mode');

        window.handlePrinterSubmission = function(optionIndex) {
            if (!currentPaper || currentPaper.answered) return;

            currentPaper.answered = true;
            currentPaper.userWasCorrect = (optionIndex === currentPaper.correctOption);
            printerAttempts[currentRoomId] = (printerAttempts[currentRoomId] || 0) + 1;

            if (currentPaper.type === 'printer_document') {
                printerTaskCorrect = currentPaper.userWasCorrect;
                if (printerTaskCorrect || printerAttempts[currentRoomId] >= 3) {
                    hasCompletedPrinterTask = true;
                }
            }

            // Set dynamic message signaling flags on the current configuration if incorrect
            if (!currentPaper.userWasCorrect && printerAttempts[currentRoomId] < 3) {
                const currentConfig = roomConfigurations[currentRoomId];
                if (currentConfig) {
                    currentConfig.pendingPrinterRetry = true;
                }
            }

            document.getElementById('popup-content').className = ''; 
            document.getElementById('popup-overlay').style.display = 'none';
            isPaused = false;

            // Turn on attention badge indicating a new message is waiting
            const badge = document.getElementById('ai-attention-badge');
            if (badge) {
                badge.style.display = 'block';
                if (typeof updateAttentionBadgePosition === "function") {
                    updateAttentionBadgePosition();
                }
            }
        };

        window.updatePrinterUI = function() {
            const optionsBlock = document.getElementById('printer-options');
            if (!optionsBlock) return;

            optionsBlock.innerHTML = `
                <button onclick="window.handlePrinterSubmission(0)" 
                        style="width: 100%; text-align: left; background: ${selectedPrinterOption === 0 ? '#eedec2' : '#fff'}; border: 2px solid ${selectedPrinterOption === 0 ? '#88765d' : '#bbb'}; padding: 12px 15px; border-radius: 4px; color: #222; font-family: 'Georgia', serif; font-size: 13px; cursor: pointer; transition: all 0.1s; font-weight: normal; line-height: 1.3; box-sizing: border-box;">
                    ${selectedPrinterOption === 0 ? '[X]' : '[ ]'} Leave the hardcopy document directly inside the tray allocation pool.
                </button>
                <button onclick="window.handlePrinterSubmission(1)" 
                        style="width: 100%; text-align: left; background: ${selectedPrinterOption === 1 ? '#eedec2' : '#fff'}; border: 2px solid ${selectedPrinterOption === 1 ? '#88765d' : '#bbb'}; padding: 12px 15px; border-radius: 4px; color: #222; font-family: 'Georgia', serif; font-size: 13px; cursor: pointer; transition: all 0.1s; font-weight: normal; line-height: 1.3; box-sizing: border-box;">
                    ${selectedPrinterOption === 1 ? '[X]' : '[ ]'} Bring media file parameters immediately to physical cross-cut destruction shredder.
                </button>
                <div style="margin-top: 6px; font-size: 11px; color: #666; font-style: italic; text-align: center; width: 100%;">
                    Press W/S or Arrow Keys to change selection. Press Space or Enter to submit.
                </div>
            `;
        };

        popupContent.innerHTML = `
        <div class="paper-layout-wrapper" style="font-family: 'Georgia', serif; background-color: #fcfbf7; color: #222; box-sizing: border-box; width: 90%; max-width: 440px; max-height: 85vh; margin: 0 auto; display: flex; flex-direction: column; padding: 20px; border: 1px solid #e3decb; box-shadow: 5px 5px 25px rgba(0, 0, 0, 0.15), inset 0 0 40px rgba(0,0,0,0.02); position: relative; border-radius: 4px; overflow: hidden;">
            <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: repeating-linear-gradient(90deg, #b8a686, #b8a686 10px, #e3decb 10px, #e3decb 20px);"></div>
            
            <div style="border-bottom: 2px double #333; padding-bottom: 6px; margin-bottom: 12px; text-align: center; flex-shrink: 0;">
                <h2 style="margin: 0; font-size: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; color: #111;">${currentPaper.title}</h2>
                <span style="font-size: 9px; font-style: italic; color: #666;">Classification Status: RESTRICTED DISTRIBUTION</span>
            </div>
            
            <div style="font-size: 11px; line-height: 1.5; color: #222; background: transparent; padding: 5px; flex-grow: 1; overflow-y: auto; white-space: pre-line; font-family: 'Courier New', Courier, monospace; border: 1px solid #f0ede0; margin-bottom: 12px; background-color: #faf9f2;">
                ${currentPaper.content}
            </div>
            
            <div style="margin-top: auto; border-top: 1px solid #ddd; padding-top: 10px; flex-shrink: 0;">
                <p style="margin: 0 0 8px 0; font-size: 11px; font-weight: bold; font-family: 'Georgia', serif; color: #333; font-style: italic;">Select actionable handling mitigation step:</p>
                <div id="printer-options" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>
        </div>
        `;
        popupOverlay.style.display = 'block';
        window.updatePrinterUI();
    }
}

function update() {
    function updateAvatarMovementAudio() {
        const cutsceneActive = (typeof isCutsceneActive !== 'undefined' && isCutsceneActive);
        if (typeof sounds === 'undefined' || !sounds || !sounds.walking) return; 

        if ((gameState === 'game' || cutsceneActive) && !isPaused && avatar.moving) {
            if (sounds.walking.paused) {
                sounds.walking.play().catch(() => {});
            }
        } else {
            if (!sounds.walking.paused) {
                sounds.walking.pause();
                sounds.walking.currentTime = 0; 
            }
        }
    }

    updateAvatarMovementAudio();

    if (isPaused || gameState !== 'game') return;

    if (typeof isCutsceneActive !== 'undefined' && isCutsceneActive) {
        let now = Date.now();
        const activeConfig = roomConfigurations[currentRoomId] || roomConfigurations.room1;
        const activeDuration = activeConfig.cutscene?.duration || 500; 

        if (now - cutsceneStartTime < activeDuration) {
            avatar.moving = true;
            avatar.angle = activeConfig.cutscene?.directionAngle || 180; 

            let currentSpeed = avatar.speed || 4;
            let angleRad = (avatar.angle - 90) * Math.PI / 180;
            
            let potentialX = avatar.x + Math.cos(angleRad) * currentSpeed;
            let potentialY = avatar.y + Math.sin(angleRad) * currentSpeed;

            if (checkAvatarBoundaries(potentialX, potentialY)) {
                if (!checkCollisionAt(potentialX, potentialY) && 
                    (typeof checkPeerPlayerCollisions !== 'function' || !checkPeerPlayerCollisions(potentialX, potentialY))) {
                    avatar.x = potentialX;
                    avatar.y = potentialY;
                }
            }
        } else {
            isCutsceneActive = false;
            avatar.moving = false;
        }

        updateAI();
        updateAttentionBadgePosition();
        updateAvatarMovementAudio();
        return; 
    }

    let moveX = 0, moveY = 0;
        
    if (keys['ArrowLeft'] || keys['KeyA'] || keys['a'] || keys['A']) moveX = -1;
    if (keys['ArrowRight'] || keys['KeyD'] || keys['d'] || keys['D']) moveX = 1;
    if (keys['ArrowUp'] || keys['KeyW'] || keys['w'] || keys['W']) moveY = -1;
    if (keys['ArrowDown'] || keys['KeyS'] || keys['s'] || keys['S']) moveY = 1;

    if (moveX !== 0 || moveY !== 0) {
        if (moveX > 0 && moveY === 0) avatar.angle = 90;      
        else if (moveX < 0 && moveY === 0) avatar.angle = 270;  
        else if (moveY < 0 && moveX === 0) avatar.angle = 0;    
        else if (moveY > 0 && moveX === 0) avatar.angle = 180;  
        else if (moveX > 0 && moveY < 0) avatar.angle = 45;     
        else if (moveX < 0 && moveY < 0) avatar.angle = 315;    
        else if (moveX > 0 && moveY > 0) avatar.angle = 135;    
        else if (moveX < 0 && moveY > 0) avatar.angle = 225;    
                
        let dx = moveX * avatar.speed;
        let dy = moveY * avatar.speed;
                
        let potentialX = avatar.x + dx;
        let potentialY = avatar.y + dy;

        if (checkAvatarBoundaries(potentialX, potentialY)) {
            if (!checkCollisionAt(potentialX, avatar.y) && 
                (typeof checkPeerPlayerCollisions !== 'function' || !checkPeerPlayerCollisions(potentialX, avatar.y))) {
                avatar.x = potentialX;
            }
            if (!checkCollisionAt(avatar.x, potentialY) && 
                (typeof checkPeerPlayerCollisions !== 'function' || !checkPeerPlayerCollisions(avatar.x, potentialY))) {
                avatar.y = potentialY;
            }
        }
                
        avatar.moving = true;
        if (moveX < 0) avatar.lastDir = 'left';
        if (moveX > 0) avatar.lastDir = 'right';
    } else { 
        avatar.moving = false; 
    }

    if (keys['KeyE'] || keys['e'] || keys['E']) {
        const activeRoomConfig = roomConfigurations[currentRoomId];
        if (activeRoomConfig && activeRoomConfig.printerDevice) {
            const pX = activeRoomConfig.printerDevice.x;
            const pY = activeRoomConfig.printerDevice.y;
            const dx = (avatar.x + 35) - pX;
            const dy = (avatar.y + 35) - pY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < interactionDist) {
                keys['KeyE'] = false;
                keys['e'] = false;
                keys['E'] = false;
                interactWithPrinter();
            }
        }
    }

    updateAI();
    updateAttentionBadgePosition(); 
    updateAvatarMovementAudio();
}

const SHREDDER_WIDTH = 75;      
const SHREDDER_HEIGHT = 80;     
const PRINTER_WIDTH = 76;       
const PRINTER_HEIGHT = 60;      


function updateAI() {
    if (isPaused || gameState !== 'game') return;
    const dx = (avatar.x + 35) - (aiAvatar.x + 35);
    const dy = (avatar.y + 35) - (aiAvatar.y + 35);
    aiAvatar.angle = Math.atan2(dy, dx) * (180 / Math.PI) - 90;
}

function checkAvatarBoundaries(targetX, targetY) {
    const HALF_SIZE = 35; 
    const PADDING = 18;   

    const localCenterX = targetX + HALF_SIZE;
    const localCenterY = targetY + HALF_SIZE;

    if (typeof aiAvatar !== 'undefined' && aiAvatar) {
        const aiCenterX = aiAvatar.x + HALF_SIZE;
        const aiCenterY = aiAvatar.y + HALF_SIZE;

        if (Math.abs(localCenterX - aiCenterX) < (HALF_SIZE + PADDING) &&
            Math.abs(localCenterY - aiCenterY) < (HALF_SIZE + PADDING)) {
            return false; 
        }
    }
    return true; 
}

function checkCollisionAt(tx, ty) {
    const playerCenterX = tx + 35;
    const playerCenterY = ty + 35;
    const playerRadius = 25; 

    const currentZones = roomConfigurations[currentRoomId]?.collisionZones || [];

    return currentZones.some(z => {
        if (z.type === 'circle') {
            const dx = playerCenterX - z.x;
            const dy = playerCenterY - z.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (playerRadius + z.radius);
        } else {
            return tx + 50 > z.x && tx < z.x + z.w && ty + 50 > z.y && ty < z.y + z.h;
        }
    });
}

function checkPeerPlayerCollisions(nextX, nextY) {
    return false; 
}

function isInsideCollisionZone(x, y, radius = 25) {
    const activeZones = roomConfigurations[currentRoomId]?.collisionZones || [];
    
    for (let z of activeZones) {
        if (z.type === 'circle') {
            const dx = x - z.x;
            const dy = y - z.y;
            if (Math.sqrt(dx * dx + dy * dy) < (z.radius + radius)) return true;
        } else {
            if (x + radius > z.x && x - radius < z.x + z.w &&
                y + radius > z.y && y - radius < z.y + z.h) {
                return true;
            }
        }
    }
    return false;
}

function drawTitleScreen() {
    ctx.clearRect(0, 0, 800, 600);
    ctx.save();
    ctx.globalAlpha = 0.50; 
    if (images.background && images.background.naturalWidth > 0) {
        ctx.drawImage(images.background, 0, 0, 800, 600);
    }
    ctx.restore(); 
    ctx.fillStyle = 'rgba(13, 14, 21, 0.4)'; 
    ctx.fillRect(0, 0, 800, 600);
}

function getRandomSpawnPosition() {
    const baseSpawnX = 300; 
    const baseSpawnY = 380;
    const horizontalStep = 45; 
    
    let currentX = baseSpawnX;
    let stepCount = 1;
    let direction = 1; 
    let attempts = 0;

    while (attempts < 50) {
        let environmentCollision = isInsideCollisionZone(currentX + 35, baseSpawnY + 35, 20);
        let peerCollision = false;
        if (typeof remotePlayers !== 'undefined' && remotePlayers) {
            for (let id of Object.keys(remotePlayers)) {
                if (id === currentStudentNumber) continue;
                
                const p = remotePlayers[id];
                if (p.roomCode === currentRoomCode) {
                    const dx = currentX - p.x;
                    const dy = baseSpawnY - p.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 40) { 
                        peerCollision = true;
                        break;
                    }
                }
            }
        }

        if (!environmentCollision && !peerCollision) {
            return { x: currentX, y: baseSpawnY };
        }
        currentX = baseSpawnX + (direction * stepCount * horizontalStep);
        if (direction === 1) {
            direction = -1; 
        } else {
            direction = 1;  
            stepCount++;    
        }
        attempts++;
    }
    return { x: baseSpawnX, y: baseSpawnY };
}
