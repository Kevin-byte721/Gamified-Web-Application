<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instructor Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #111; color: #4CAF50; font-family: 'Press Start 2P', cursive; padding: 40px; }
        .panel { border: 4px solid #4CAF50; padding: 20px; background: #222; margin-top: 20px; }
        select { background: #000; color: #4CAF50; border: 2px solid #4CAF50; padding: 10px; font-family: 'Press Start 2P'; margin-bottom: 20px; width: 100%; }
        .chart-container { height: 300px; position: relative; }
        h1 { font-size: 18px; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h1>[ TEACHER_ANALYTICS_OVERRIDE ]</h1>

    <div class="panel">
        <label>SELECT AGENT TO VIEW PERFORMANCE:</label><br><br>
        <select id="studentSelector" onchange="updateTeacherChart()">
            <option value="">-- SELECT STUDENT --</option>
        </select>

        <div class="chart-container">
            <canvas id="teacherScoreChart"></canvas>
            <p id="noDataMsg" style="text-align:center; display:none; margin-top:100px;">[ NO DATA FOUND FOR THIS AGENT ]</p>
        </div>
    </div>

    <script>
        let myChart = null;

        window.onload = function() {
            // 1. SECURITY CHECK: Only let teachers see this
            if (localStorage.getItem('userRole') !== 'teacher') {
                document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>[ ACCESS DENIED ]<br>TEACHER CREDENTIALS REQUIRED</h1>";
                return;
            }

            // 2. POPULATE DROPDOWN
            const selector = document.getElementById('studentSelector');
            // Extract unique student names from the leaderboard data
            const allScores = JSON.parse(localStorage.getItem('cyberDashLeaderboard')) || [];
            const uniqueStudents = [...new Set(allScores.map(item => item.username))];

            uniqueStudents.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerHTML = name;
                selector.appendChild(opt);
            });
        };

        function updateTeacherChart() {
            const selectedStudent = document.getElementById('studentSelector').value;
            const allScores = JSON.parse(localStorage.getItem('cyberDashLeaderboard')) || [];
            
            // Filter scores for the specific student
            const stats = { m1: 0, m2: 0, m3: 0 };
            allScores.filter(s => s.username === selectedStudent).forEach(entry => {
                stats[`m${entry.module}`] = entry.score;
            });

            const canvas = document.getElementById('teacherScoreChart');
            const noData = document.getElementById('noDataMsg');

            if (!selectedStudent || (stats.m1 === 0 && stats.m2 === 0 && stats.m3 === 0)) {
                canvas.style.display = 'none';
                noData.style.display = 'block';
                return;
            }

            canvas.style.display = 'block';
            noData.style.display = 'none';

            const ctx = canvas.getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['SAFE', 'SAVVY', 'SOCIAL'],
                    datasets: [{
                        label: `High Scores for ${selectedStudent}`,
                        data: [stats.m1, stats.m2, stats.m3],
                        backgroundColor: '#4CAF50'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#4CAF50' } },
                        x: { ticks: { color: '#4CAF50' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
