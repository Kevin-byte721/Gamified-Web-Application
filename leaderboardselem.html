<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Dash Leaderboards</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #111;
            color: #4CAF50;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        h1 { font-size: 20px; text-shadow: 4px 4px #000; margin-bottom: 20px; }
        
        .controls {
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: #4CAF50;
            color: #000;
            border: 2px solid #fff;
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            border: 4px solid #4CAF50;
            background-color: #000;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border: 2px solid #333;
        }
        th { background-color: #222; font-size: 12px; color: #fff; }
        td { font-size: 10px; }
        tr:nth-child(even) { background-color: #111; }
        tr:hover { background-color: #1a1a1a; }

        .rank-1 { color: #ffd700; text-shadow: 1px 1px #555; } /* Gold */
        .rank-2 { color: #c0c0c0; text-shadow: 1px 1px #555; } /* Silver */
        .rank-3 { color: #cd7f32; text-shadow: 1px 1px #555; } /* Bronze */
    </style>
</head>
<body>
    <h1>TOP SECURITY AGENTS</h1>
    
    

    <table id="leaderboardTable">
        <thead>
            <tr>
                <th>RANK</th>
                <th>AGENT</th>
                <th>SCORE</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody">
            </tbody>
    </table>

    <script>
        function displayScores() {
            // This reads the specific key used in your consolidated gameWin logic
            const rawData = localStorage.getItem('cyberDashLeaderboard');
            const scores = JSON.parse(localStorage.getItem('cyberDashLeaderboard')) || [];
            const tbody = document.getElementById('leaderboardBody');
            
            // Clear existing table rows
            tbody.innerHTML = '';

            if (scores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 30px; color: #666;">NO MISSION DATA FOUND</td></tr>';
                return;
            }

            // Display top 10 scores
            scores.forEach((entry, index) => {
                const row = document.createElement('tr');
                const rankClass = index < 3 ? `rank-${index + 1}` : '';
                
                // Ensure name and score exist before displaying
                const name = entry.username ? entry.username.toUpperCase() : "UNKNOWN";
                const score = entry.score !== undefined ? entry.score : 0;

                row.innerHTML = `
                    <td class="${rankClass}">${index + 1}</td>
                    <td class="${rankClass}">${name}</td>
                    <td>${score} PTS</td>
                `;
                tbody.appendChild(row);
            });
            
            console.log("Leaderboard updated from storage.");
        }

        // Run on load
        window.onload = displayScores;
    </script>
</body>
</html>
