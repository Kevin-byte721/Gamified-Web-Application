<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Dash Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        /* --- LOGIN OVERLAY --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #4CAF50;
        }
        .login-box { border: 4px solid #4CAF50; padding: 40px; text-align: center; background: #222; box-shadow: 10px 10px 0px #000; }
        .login-box h2 { font-size: 14px; margin-bottom: 20px; }
        .login-box input { display: block; margin: 15px auto; padding: 10px; font-family: 'Press Start 2P'; font-size: 10px; border: 2px solid #4CAF50; background: #000; color: #fff; width: 250px; }
        .login-btn { background: #4CAF50; color: #000; border: none; padding: 10px 20px; font-family: 'Press Start 2P'; cursor: pointer; border: 2px solid #fff; }
        .login-btn:hover { background: #45a049; }

        /* --- SIDE NAVIGATION BAR --- */
        #mainNav {
            width: 220px;
            background-color: #222;
            border-right: 4px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px; 
            box-sizing: border-box;
            z-index: 10;
            transition: width 0.3s ease;
            position: relative;
        }

        #mainNav.collapsed { width: 80px; padding: 20px 5px; }

        #mainNav.collapsed .nav-header,
        #mainNav.collapsed .nav-button span,
        #mainNav.collapsed .version-tag,
        #mainNav.collapsed .user-info { display: none; }

        #toggleBtn {
            align-self: flex-end; 
            background: #4CAF50;
            border: 2px solid #fff;
            color: #000;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            padding: 5px 8px;
            margin-bottom: 20px;
        }

        #mainNav.collapsed #toggleBtn { align-self: center; }

        .nav-header { color: #4CAF50; font-size: 12px; margin-bottom: 40px; text-align: center; line-height: 1.4; }
        .user-info { color: #4CAF50; font-size: 8px; margin-bottom: 20px; text-align: center; width: 100%; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .nav-button {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px 5px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            background-color: #333;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .nav-button:hover { background-color: #444; transform: translateX(5px); box-shadow: -4px 0 0 #4CAF50; }

        /* --- CONTENT WRAPPER --- */
        #gameWrapper {
            flex-grow: 1;
            position: relative;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #homeContent { color: #4CAF50; text-align: center; padding: 40px; max-width: 700px; }
        .instruction-box { border: 2px dashed #4CAF50; padding: 20px; margin: 20px 0; background: rgba(76, 175, 80, 0.05); color: #fff; font-size: 10px; line-height: 1.6; }

        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* Container to hold the grid and limit width */
#gridContainer {
    width: 850px; /* Adjust based on your card width to fit 5 cards */
    margin: 0 auto;
    overflow: hidden;
    position: relative;
    animation: fadeIn 0.3s;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
#userGrid {
    display: flex;
    gap: 20px;
    padding: 20px 10px;
    overflow-x: auto;
    scroll-behavior: smooth;
    /* This makes it snap so you always land on a card */
    scroll-snap-type: x mandatory; 
}

/* Custom Scrollbar for a retro look */
#userGrid::-webkit-scrollbar {
    height: 8px;
}
#userGrid::-webkit-scrollbar-track {
    background: #222;
}
#userGrid::-webkit-scrollbar-thumb {
    background: #4CAF50;
    border-radius: 4px;
}

/* Apply snapping to the cards */
.agent-card {
    flex: 0 0 calc(20% - 20px); /* Exactly 5 cards per view minus gap */
    scroll-snap-align: start;
}
    </style>
</head>
<body>

    <div id="loginOverlay">
    <div class="login-box" style="max-width: 1000px; width: 95%;">
        <h2>[ SELECT AGENT IDENTITY ]</h2>
        
        <div id="gridContainer" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <button onclick="scrollGrid(-1)" class="nav-btn" style="background: none; border: 2px solid #4CAF50; color: #4CAF50; cursor: pointer; padding: 10px; font-family: 'Press Start 2P'; font-size: 16px; border-radius: 5px;">&lt;</button>

            <div id="userGrid" onscroll="updateActiveDot()" style="display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 20px; padding: 20px 0; flex: 1; scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none;">
            </div>

            <button onclick="scrollGrid(1)" class="nav-btn" style="background: none; border: 2px solid #4CAF50; color: #4CAF50; cursor: pointer; padding: 10px; font-family: 'Press Start 2P'; font-size: 16px; border-radius: 5px;">&gt;</button>
        </div>

        <div id="carouselDots" style="display: flex; justify-content: center; gap: 10px; margin: 10px 0 20px 0;">
            </div>

        <div id="passwordSection" style="display: none; margin-top: 20px; text-align: center;">
            <div id="activeAgentDisplay" style="margin-bottom: 20px;">
                <div id="activeAgentAvatar" style="width: 80px; height: 80px; background: #333; border-radius: 50%; margin: 0 auto 10px; border: 3px solid #4CAF50; overflow: hidden;">
                    <img src="" id="activeImg" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div id="activeAgentName" style="font-size: 10px; color: #4CAF50; text-shadow: 2px 2px #000;"></div>
            </div>

            <input type="password" id="passwordInput" placeholder="ENTER PASSWORD">
            <div style="margin-top: 15px;">
                <button class="login-btn" onclick="attemptLogin()">INITIALIZE</button>
                <button class="login-btn" onclick="cancelSelection()" style="background:#444; border-color:#666;">BACK</button>
            </div>
        </div>

        <p id="loginError" style="color: #ff4444; font-size: 8px; margin-top: 15px; display: none;">UNAUTHORIZED ACCESS DENIED</p>
    </div>
</div>

    <nav id="mainNav">
        <button id="toggleBtn" onclick="toggleNav()" title="Toggle Sidebar">X</button>

        <div class="nav-header">SYSTEM<br>DASHBOARD</div>
        <div class="user-info">AGENT: <span id="agentName">---</span></div>
        
        <button class="nav-button" onclick="showHome()">
            🏠 <span>Home</span>
        </button>
        
        <button class="nav-button" onclick="loadContent('module.html')">
            📦 <span>Module</span>
        </button>

        <button class="nav-button" onclick="loadContent('Cyber_Dash_Security_Runner.html')">
            🎮 <span>Play Game</span>
        </button>

        <button class="nav-button" onclick="loadContent('leaderboards.html')">
    🏆 <span>Scores</span>
</button>
        
        
        <button class="nav-button" onclick="location.reload()" style="margin-top: auto; border-color: #ff4444;">
            🚫 <span>Logout</span>
        </button>
        
        <div class="version-tag" style="color: #666; font-size: 8px; margin-top: 10px;">v1.1.0-SEC</div>
    </nav>

    <div id="gameWrapper">
        <div id="homeContent">
            <h1>WELCOME, AGENT</h1>
            <div class="instruction-box">
                [ INITIALIZING MISSION BRIEF ]<br><br>
                To ensure maximum field efficiency, you are required to 
                <strong>complete the Module training</strong> before 
                engaging in the Cyber Dash Security Runner simulation.
            </div>
        </div>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
    // 1. GLOBAL DATA & STATE
    // Customize the displayNames to match your team/agents
    // Generates 50 students: Student 1 to Student 50
const USERS = Array.from({ length: 20 }, (_, i) => ({
    username: `user${i + 1}`,
    password: `password${i + 1}`,
    displayName: `STUDENT ${i + 1}`,
    avatar: `profile-icon.jpg` // Set this as the global icon
}));

    let selectedUser = null;
    let currentUser = null;

    // DOM Elements
    const homeView = document.getElementById('homeContent');
    const iframe = document.getElementById('gameFrame');

// 1. Update the constant to 3
const CARDS_PER_PAGE = 3;

function initUserGrid() {
    const grid = document.getElementById('userGrid');
    if (!grid) return;
    grid.innerHTML = ''; 

    USERS.forEach(user => {
        const card = document.createElement('div');
        card.className = 'agent-card';
        
        // 2. Adjust width to roughly 33% (calc(33.33% - 14px))
        // This ensures exactly 3 cards fit in the visible area
        card.style.cssText = `
            cursor: pointer; 
            padding: 10px; 
            text-align: center; 
            width: calc(33.33% - 14px); 
            flex: 0 0 auto; 
            scroll-snap-align: center; 
            transition: transform 0.2s;
        `;
        
        card.innerHTML = `
            <div class="avatar-circle" style="width: 80px; height: 80px; background: #222; border-radius: 50%; margin: 0 auto 10px; border: 3px solid #4CAF50; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center;">
                <img src="${user.avatar}" 
                     style="width:100%; height:100%; object-fit:cover;" 
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span style="display:none; color:#4CAF50; font-size:8px; font-family:sans-serif;">[ AGENT ]</span>
            </div>
            <div style="font-size: 7px; color: #fff; font-family: 'Press Start 2P'; text-transform: uppercase;">${user.displayName}</div>
        `;
        
        card.onmouseover = () => card.style.transform = 'scale(1.05)';
        card.onmouseout = () => card.style.transform = 'scale(1.0)';
        
        card.onclick = () => selectUser(user);
        grid.appendChild(card);
    });

    createDots(); 
}

// 3. Ensure scrolling slides 3 users at a time
function scrollGrid(direction) {
    const grid = document.getElementById('userGrid');
    // OffsetWidth now represents the width of exactly 3 users
    const scrollAmount = grid.offsetWidth; 
    grid.scrollBy({
        left: direction * scrollAmount,
        behavior: 'smooth'
    });
}

/**
 * Generates navigation dots based on the total number of agent pages.
 */
function createDots() {
    const dotsContainer = document.getElementById('carouselDots');
    const totalPages = Math.ceil(USERS.length / CARDS_PER_PAGE);
    dotsContainer.innerHTML = '';

    for (let i = 0; i < totalPages; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.cssText = `width: 10px; height: 10px; border-radius: 50%; border: 1px solid #4CAF50; background: transparent; cursor: pointer; transition: 0.3s;`;
        dot.onclick = () => {
            const grid = document.getElementById('userGrid');
            grid.scrollTo({ left: i * grid.offsetWidth, behavior: 'smooth' });
        };
        dotsContainer.appendChild(dot);
    }
    updateActiveDot();
}

/**
 * Updates the visual state of the circle indicators 
 * during scroll events.
 */
function updateActiveDot() {
    const grid = document.getElementById('userGrid');
    const dots = document.querySelectorAll('.dot');
    const scrollPosition = grid.scrollLeft;
    const pageWidth = grid.offsetWidth;
    
    // Calculate the active page index
    const activeIndex = Math.round(scrollPosition / pageWidth);

    dots.forEach((dot, index) => {
        if (index === activeIndex) {
            dot.style.background = '#4CAF50';
            dot.style.boxShadow = '0 0 8px #4CAF50';
        } else {
            dot.style.background = 'transparent';
            dot.style.boxShadow = 'none';
        }
    });
}
   /**
 * Handles agent selection: hides carousel, indicators, and autofills password.
 */
function selectUser(user) {
    selectedUser = user;
    
    const activeName = document.getElementById('activeAgentName');
    const activeImg = document.getElementById('activeImg');
    const passwordField = document.getElementById('passwordInput');
    const gridContainer = document.getElementById('gridContainer');
    const dotsContainer = document.getElementById('carouselDots');
    const passwordSection = document.getElementById('passwordSection');
    
    // Set identity details
    if (activeName) activeName.innerText = `AGENT: ${user.displayName}`;
    
    if (activeImg) {
        activeImg.style.display = 'block';
        activeImg.src = user.avatar; 
        activeImg.onerror = function() { this.style.display = 'none'; };
    }

    // --- AUTOFILL LOGIC ---
    if (passwordField) {
        passwordField.value = user.password; 
    } 

    // Hide selection carousel and indicators (dots) as per requested view
    if (gridContainer) gridContainer.style.display = 'none';
    if (dotsContainer) dotsContainer.style.display = 'none'; // Removes indicator
    
    // Show the focused password entry box
    if (passwordSection) passwordSection.style.display = 'block';
    
    // Focus the button for quick "Initialize"
    const loginBtn = document.querySelector('.login-btn');
    if (loginBtn) loginBtn.focus();
}

/**
 * Restoration logic: brings back the full carousel and navigation dots.
 */
function cancelSelection() {
    const passwordSection = document.getElementById('passwordSection');
    const gridContainer = document.getElementById('gridContainer');
    const dotsContainer = document.getElementById('carouselDots');
    const passwordField = document.getElementById('passwordInput');
    const errorMsg = document.getElementById('loginError');

    // 1. Hide the password entry area
    if (passwordSection) passwordSection.style.display = 'none';
    
    // 2. Restore the selection grid and indicators
    // Use 'flex' to ensure the arrows and cards align horizontally
    if (gridContainer) gridContainer.style.display = 'flex'; 
    if (dotsContainer) dotsContainer.style.display = 'flex'; // Restores indicator
    
    // 3. Clear the password input for security
    if (passwordField) passwordField.value = '';
    
    // 4. Hide any existing error messages
    if (errorMsg) errorMsg.style.display = 'none';
    
    // 5. Ensure dots are updated based on current scroll position
    updateActiveDot();
}

    function attemptLogin() {
        const pInput = document.getElementById('passwordInput');
        const p = pInput.value.trim();
        
        // No need to check username; we check the password of the selectedUser
        if (selectedUser && p === selectedUser.password) {
            currentUser = selectedUser.username;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('agentName').innerText = selectedUser.displayName;
        } else {
            const err = document.getElementById('loginError');
            if (err) {
                err.style.display = 'block';
                setTimeout(() => { err.style.display = 'none'; }, 2000);
            }
        }
    }

    window.addEventListener('message', function(event) {
    if (event.data.type === 'SAVE_SCORE') {
        const newScore = event.data.score;
        const userObj = USERS.find(u => u.username === currentUser);
        const displayName = userObj ? userObj.displayName : "STUDENT";

        // 1. Get existing leaderboard data
        let leaderboard = JSON.parse(localStorage.getItem('cyberDashLeaderboard') || "[]");

        // 2. Check if this specific student already has a recorded score
        const existingEntryIndex = leaderboard.findIndex(entry => entry.username === displayName);

        if (existingEntryIndex !== -1) {
            // Student exists: Only update if the new score is a High Score
            if (newScore > leaderboard[existingEntryIndex].score) {
                leaderboard[existingEntryIndex].score = newScore;
                leaderboard[existingEntryIndex].date = new Date().toISOString();
                console.log(`High score updated for ${displayName}: ${newScore}`);
            } else {
                console.log(`Score of ${newScore} did not beat existing record for ${displayName}`);
                return; // Exit without saving if it's not a personal best
            }
        } else {
            // Student does not exist: Add their first record
            leaderboard.push({
                username: displayName,
                score: newScore,
                date: new Date().toISOString()
            });
            console.log(`First record saved for ${displayName}: ${newScore}`);
        }

        // 3. Sort (Highest first) and keep top 10 overall
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 10);

        // 4. Save back to localStorage
        localStorage.setItem('cyberDashLeaderboard', JSON.stringify(leaderboard));
    }
});

    // 4. NAVIGATION FUNCTIONS
    function toggleNav() {
        const nav = document.getElementById('mainNav');
        const toggleBtn = document.getElementById('toggleBtn');
        if (nav && toggleBtn) {
            nav.classList.toggle('collapsed');
            toggleBtn.innerText = nav.classList.contains('collapsed') ? ">" : "X";
        }
    }

    function showHome() {
        if (iframe) {
            iframe.classList.remove('active');
            iframe.src = "";
        }
        if (homeView) homeView.style.display = 'block';
    }

    function loadContent(page) {
        if (homeView) homeView.style.display = 'none';
        if (iframe) {
            iframe.classList.add('active');
            iframe.src = page;
        }
    }

    function showLeaderboard() {
        loadContent('leaderboards.html');
    }

    // Initialize the grid on start
    window.onload = initUserGrid;
</script>
</body>
</html>
