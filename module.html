<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Framework</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #222;
            --accent-green: #4CAF50;
            --text-color: #eee;
            --lock-overlay: rgba(0, 0, 0, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100%;
        }

        .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        .header-title {
            font-family: 'Press Start 2P', cursive;
            color: var(--accent-green);
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .module-card {
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .module-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
        }

        .card-body { padding: 20px; }
        .module-name { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: var(--accent-green); }
        .module-desc { font-size: 13px; color: #aaa; line-height: 1.4; }

        /* CONTENT VIEWER */
        #moduleViewer {
            display: none;
            padding: 40px;
            background: #fff;
            color: #333;
            min-height: 100vh;
        }

        .back-btn {
            font-family: 'Press Start 2P', cursive;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            font-size: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        #contentBody h2 { color: #2e7d32; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #contentBody ul { line-height: 1.8; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="gridView" class="container">
        <h1 class="header-title">THE S3 FRAMEWORK: CYBER-READY SHS</h1>
        <div class="modules-grid" id="cardContainer"></div>
    </div>

    <div id="moduleViewer">
        <button class="back-btn" onclick="closeModule()">⬅ BACK</button>
        <h1 id="contentTitle"></h1>
        <div id="contentBody"></div>
    </div>

<script>
    
    const s3modules = [
    {
        id: 1,
        title: "Module 1: SAFE (Technical Defense)",
        desc: "Mastering Defense-in-Depth, Zero Trust architectures, and advanced encryption for the modern professional.",
        image: "photo-1550751827-4bd374c3f58b.jpg",
        progress: 0,
        requiredTime: 10, // 3 Minutes
        content: `
            <p style="background: #f0f0f0; padding: 10px; border-radius: 5px; color: #333;">
                <b>Course Description:</b> Establishing a multi-layered defense strategy to protect personal and organizational data from technical exploitation.
            </p>
            <p><i>(S3 Framework: Senior High School Edition)</i></p>
            
            <h3>Introduction</h3>
            <p>For Grade 11 and 12 students, cybersecurity is no longer just about avoiding "bad links." As you prepare for higher education or the global workforce, you must transition from basic habits to a professional security mindset known as <b>Defense-in-Depth</b>.</p>

            <h3>The Zero Trust Architecture</h3>
            <p>The traditional security model was "trust but verify." In today's threat landscape, we use <b>Zero Trust</b>: "Never trust, always verify." This means even if you are logged into a trusted network, every access request to sensitive data must be authenticated and encrypted.</p>

            <h3>1. Hardening Your Digital Identity</h3>
            <p>Your password is the first line of defense, but it is never enough on its own. Professionals use <b>Multi-Factor Authentication (MFA)</b>. 
            <ul>
                <li><b>MFA Fatigue:</b> Be wary of "push bombing," where attackers spam your phone with login approvals hoping you will click 'Yes' just to stop the notifications.</li>
                <li><b>Hardware Keys:</b> Consider using physical security keys (like YubiKeys) for your most sensitive professional accounts.</li>
            </ul></p>

            <h3>2. Data at Rest: Disk Encryption</h3>
            <p>If your laptop or mobile device is physically stolen, a login password will not stop a sophisticated thief from pulling out the hard drive to read your files. Ensure <b>Full Disk Encryption</b> (BitLocker for Windows or FileVault for macOS) is active to scramble your data into unreadable ciphertext.</p>

            <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #4CAF50; margin-top: 20px;">
                <h3>Professional Concept: The Layered Onion</h3>
                <p>Imagine your digital life as an onion:</p>
                <ul>
                    <li><b>Outer Layer:</b> Secure Network (VPN/Firewall).</li>
                    <li><b>Middle Layer:</b> Strong Identity (MFA/Password Manager).</li>
                    <li><b>Inner Core:</b> Encrypted Data (Disk Encryption).</li>
                </ul>
                <p>An attacker must peel back every single layer to reach your information.</p>
            </div>

            <h3>Reflection</h3>
            <p>If you lost your laptop today at school or a café, is your data encrypted? Or is a simple login password the only thing standing between a stranger and your entire digital life?</p>
            <p><b>Key Takeaway:</b> Being "Safe" means building multiple technical barriers so that the failure of one layer does not lead to a total compromise.</p>
        `
    },
    {
        id: 2,
        title: "Module 2: SAVVY (Information Intelligence)",
        desc: "Navigating deepfakes, sophisticated social engineering, and the legalities of the Data Privacy Act.",
        image: "photo-1563986768609-322da13575f3.jpg",
        progress: 0,
        requiredTime: 10, // 3 Minutes
        content: `
            <p style="background: #f0f0f0; padding: 10px; border-radius: 5px; color: #333;">
                <b>Course Description:</b> Developing the analytical skills to identify sophisticated psychological manipulation and understanding digital legal rights.
            </p>
            <p><i>(S3 Framework: Senior High School Edition)</i></p>

            <h3>The Human Firewall</h3>
            <p>Most cyberattacks do not start with a "hack"—they start with a conversation. Being "Savvy" means recognizing that psychology is often used as a weapon through <b>Social Engineering</b>.</p>

            <h3>1. Spear Phishing and OSINT</h3>
            <p>Generic phishing emails are easy to spot. However, <b>Spear Phishing</b> uses Open Source Intelligence (OSINT) to target you specifically. Attackers might research your school (De La Salle Lipa), your current projects, or your friends to create a fake email that looks 100% authentic.</p>

            <h3>2. The Era of Synthetic Media (Deepfakes)</h3>
            <p>As AI improves, we can no longer trust our eyes or ears. Deepfake technology can mimic a parent's voice or a teacher's face in a video call. Always verify urgent requests for money or sensitive data by calling the person back on a known, trusted number.</p>

            <h3>3. Compliance: Data Privacy Act of 2012</h3>
            <p>In the Philippines, the <b>Data Privacy Act (RA 10173)</b> protects your rights. You have the right to be informed, the right to object to processing, and the right to access your data. Being Savvy means reading a "Privacy Policy" to ensure a company isn't selling your habits to third-party brokers.</p>

            <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #4CAF50; margin-top: 20px;">
                <h3>Savvy Strategy: The "S.T.O.P." Method</h3>
                <ul>
                    <li><b>S</b>crutinize the sender's actual email address.</li>
                    <li><b>T</b>ake a breath; attackers use artificial urgency to make you panic.</li>
                    <li><b>O</b>bserve the links without clicking (hover to see the real URL).</li>
                    <li><b>P</b>hone a friend or the official institution to verify the request.</li>
                </ul>
            </div>

            <h3>Reflection</h3>
            <p>Have you ever clicked 'Accept' on a Terms of Service without reading it? What data did you just legally give away about your location, your contacts, or your private messages?</p>
            <p><b>Key Takeaway:</b> Intelligence is your best defense. If a digital interaction feels urgent, strange, or too good to be true, it likely is.</p>
        `
    },
    {
        id: 3,
        title: "Module 3: SOCIAL (Digital Citizenship)",
        desc: "Protecting your professional digital footprint and the ethics of social responsibility in cybersecurity.",
        image: "photo-1522202176988-66273c2fd55f.jpg",
        progress: 0,
        requiredTime: 10, // 3 Minutes
        content: `
            <p style="background: #f0f0f0; padding: 10px; border-radius: 5px; color: #333;">
                <b>Course Description:</b> Understanding the long-term impact of a digital footprint and the ethical responsibilities of a connected citizen.
            </p>
            <p><i>(S3 Framework: Senior High School Edition)</i></p>

            <h3>The Permanent Shadow</h3>
            <p>Everything you do online—every post, comment, and "private" message—is a permanent part of your <b>Digital Footprint</b>. For SHS students, this footprint is often the first thing university admissions or future employers will investigate.</p>

            <h3>1. The Risk of Oversharing</h3>
            <p>Posting photos of your school ID, your home, or even a view from your window provides "metadata" to attackers. This information can lead to <b>Doxing</b> (publishing your private info) or physical security risks. Practice "Digital Minimalism" by only sharing what is absolutely necessary.</p>

            <h3>2. Collective Security and Reporting</h3>
            <p>Cybersecurity is a team effort. If you notice a classmate’s social media account is compromised or posting spam, don't just ignore it. Being "Socially" responsible means alerting them through a different channel and reporting the compromised account to protect your entire network.</p>

            <h3>3. Ethical Boundaries: The Law</h3>
            <p>With the technical skills you learn in Information Technology, you have the power to help or harm. The <b>Cybercrime Prevention Act of 2012 (RA 10175)</b> makes unauthorized access and data interference a criminal offense. Aim to be a "White Hat"—using your knowledge to build a safer community for everyone.</p>

            <div style="background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #4CAF50; margin-top: 20px;">
                <h3>The Social Integrity Test</h3>
                <p>Before you post or share, ask yourself:</p>
                <ul>
                    <li><b>Is it secure?</b> (Does this reveal my location or private data?)</li>
                    <li><b>Is it kind?</b> (Does this maintain my professional reputation?)</li>
                    <li><b>Is it true?</b> (Am I spreading misinformation or a verified fact?)</li>
                </ul>
            </div>

            <h3>Reflection</h3>
            <p>If a recruiter for your dream job looked at your social media history from three years ago, would they still want to hire you? How can you start curating a more professional "Social" presence today?</p>
            <p><b>Key Takeaway:</b> Your digital footprint is your legacy. Use your social platform to protect your community and build your professional future.</p>
        `
    }
];

    // --- CONSOLIDATED SCRIPT FOR module.html (GAME-INDEPENDENT) ---

let currentModuleId = null;

/**
 * Loads progress from localStorage to ensure the grid displays current completion status.
 */
function loadSavedProgress() {
    s3modules.forEach(m => {
        const saved = localStorage.getItem(`module_progress_${m.id}`);
        if (saved) {
            m.progress = parseInt(saved);
        }
    });
}

/**
 * Renders the module selection cards based on the s3modules array.
 */
/**
 * Renders the module selection cards based on the s3modules array.
 * This function handles the display of module covers and progress bars.
 */
function renderCards() {
    loadSavedProgress(); 
    const container = document.getElementById('cardContainer');
    if (!container) return;

    container.innerHTML = s3modules.map(m => `
        <div class="module-card" onclick="openModule(${m.id})">
            <img src="${m.image}" alt="${m.title}" style="width: 100%; height: 150px; object-fit: cover; border-bottom: 2px solid #333;">
            
            <div class="card-body">
                <div class="module-name">${m.title}</div>
                <div class="module-desc">${m.desc}</div>
                
                <div style="background: #333; height: 8px; border-radius: 4px; margin-top: 15px; overflow: hidden;">
                    <div style="background: #4CAF50; height: 100%; width: ${m.progress}%; transition: width 0.3s;"></div>
                </div>
                <div style="font-size: 11px; color: #888; margin-top: 5px; text-align: right;">${m.progress}% Read</div>
            </div>
        </div>
    `).join('');
}

/**
 * Opens the module viewer and displays content immediately without timers or game locks.
 */
function openModule(id) {
    currentModuleId = id;
    const module = s3modules.find(m => m.id === id);
    
    document.getElementById('gridView').style.display = 'none';
    document.getElementById('moduleViewer').style.display = 'block';
    document.getElementById('contentTitle').innerText = module.title;
    document.getElementById('contentBody').innerHTML = module.content;

    // Update the button state based on existing progress
    const btn = document.getElementById('markReadBtn');
    if (btn) {
        btn.innerText = (module.progress === 100) ? "COMPLETED ✅" : "MARK AS READ";
    }

    window.scrollTo(0, 0);
}

/**
 * Manually marks a module as 100% complete and saves it to localStorage.
 * This replaces the previous game-driven completion logic.
 */
function markAsComplete() {
    if (currentModuleId !== null) {
        localStorage.setItem(`module_progress_${currentModuleId}`, "100");
        
        const btn = document.getElementById('markReadBtn');
        if (btn) btn.innerText = "COMPLETED ✅";
        
        // Optional: Notify the dashboard index.html that a module was finished
        window.parent.postMessage({ 
            type: 'MODULE_COMPLETE', 
            moduleId: currentModuleId 
        }, "*");
    }
}

/**
 * Returns to the grid view and refreshes the cards to show updated progress.
 */
function closeModule() {
    document.getElementById('moduleViewer').style.display = 'none';
    document.getElementById('gridView').style.display = 'block';
    renderCards();
    window.scrollTo(0, 0);
}

/**
 * Wipes all progress from localStorage for testing or reset purposes.
 */
function clearAllProgress() {
    if (confirm("Reset all learning progress? This cannot be undone.")) {
        s3modules.forEach(m => {
            localStorage.removeItem(`module_progress_${m.id}`);
            m.progress = 0;
        });
        renderCards();
    }
}

// Initial call to draw the interface
renderCards();
// Example logic inside the module completion script
localStorage.setItem('moduleProgress', JSON.stringify(progress));
window.parent.postMessage('updateProgress', '*');
</script>
</body>
</html>
